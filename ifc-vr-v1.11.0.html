<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="Permissions-Policy" content="xr-spatial-tracking=*"/>
  <title>IFC VR — v1.11.0</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0c12; color: #e2e8f0; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
    #ui-overlay {
      position: fixed; inset: 0; z-index: 10;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 20px;
      background: radial-gradient(ellipse at center, #0d1119 0%, #060810 100%);
    }
    #ui-overlay.hidden { display: none; }
    .logo {
      font-size: 28px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase;
      background: linear-gradient(135deg, #3b82f6, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .subtitle { font-size: 13px; color: #64748b; letter-spacing: 2px; text-transform: uppercase; }
    .drop-zone {
      width: 340px; padding: 32px 24px; border: 2px dashed #1f2433; border-radius: 16px;
      display: flex; flex-direction: column; align-items: center; gap: 14px; cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .drop-zone:hover, .drop-zone.dragover { border-color: #3b82f6; background: rgba(59,130,246,0.06); }
    .drop-icon { font-size: 36px; }
    .drop-title { font-size: 16px; font-weight: 600; }
    .drop-sub { font-size: 12px; color: #64748b; text-align: center; }
    .drop-btn {
      padding: 10px 28px; background: #3b82f6; color: #fff; border: none; border-radius: 8px;
      font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.15s;
    }
    .drop-btn:hover { background: #2563eb; }
    #file-input { display: none; }
    #vr-btn {
      display: none; padding: 14px 40px;
      background: linear-gradient(135deg, #3b82f6, #06b6d4);
      color: #fff; border: none; border-radius: 12px;
      font-size: 16px; font-weight: 700; cursor: pointer; letter-spacing: 1px;
      transition: opacity 0.2s, transform 0.1s; text-transform: uppercase;
    }
    #vr-btn:hover { opacity: 0.9; transform: scale(1.02); }
    #vr-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    #no-vr-msg { display: none; color: #f59e0b; font-size: 13px; text-align: center; max-width: 300px; }

    /* ── LOADING ── */
    #loading {
      position: fixed; inset: 0; z-index: 20;
      display: none; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
      background: rgba(6,8,16,0.96);
    }
    .spinner { width: 44px; height: 44px; border: 3px solid #1f2433; border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .load-text { font-size: 14px; color: #94a3b8; font-family: monospace; }
    .load-sub { font-size: 12px; color: #334155; font-family: monospace; min-height: 16px; }
    #prog-wrap { width: 240px; height: 3px; background: #1f2433; border-radius: 2px; overflow: hidden; }
    #prog-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #3b82f6, #06b6d4); transition: width 0.3s; }

    /* ── HUD (visible in VR via flat overlay in scene) ── */
    canvas#c { position: fixed; inset: 0; width: 100%; height: 100%; display: block; }

    /* ── URL LOADER ── */
    .url-section {
      width: 340px; display: flex; flex-direction: column; gap: 8px;
    }
    .url-label { font-size: 11px; color: #475569; text-align: center; letter-spacing: 1px; text-transform: uppercase; }
    .url-row { display: flex; gap: 8px; }
    .url-input {
      flex: 1; padding: 9px 12px; background: #0d1117; border: 1px solid #1f2433;
      border-radius: 8px; color: #e2e8f0; font-size: 12px; font-family: monospace;
      outline: none; transition: border-color 0.2s;
    }
    .url-input:focus { border-color: #3b82f6; }
    .url-btn {
      padding: 9px 16px; background: #1f2d4a; color: #60a5fa; border: 1px solid #1e3a5f;
      border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap;
      transition: background 0.15s;
    }
    .url-btn:hover { background: #1e3a5f; }
    .url-status { font-size: 11px; color: #64748b; text-align: center; min-height: 16px; }

    .disc-title { font-size: 11px; font-weight: 700; color: #06b6d4; text-transform: uppercase; letter-spacing: 1px; }
    .disc-row { display: flex; align-items: center; gap: 10px; }
    .disc-label { flex: 1; font-size: 13px; }
    .disc-badge { padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; color: #fff; }
    .disc-toggle {
      width: 36px; height: 20px; border-radius: 10px; border: none; cursor: pointer;
      background: #3b82f6; position: relative; transition: background 0.2s;
    }
    .disc-toggle::after {
      content: ''; position: absolute; width: 14px; height: 14px; background: #fff;
      border-radius: 50%; top: 3px; left: 3px; transition: transform 0.2s;
    }
    .disc-toggle.off { background: #1f2433; }
    .disc-toggle.off::after { transform: translateX(16px); }

    /* ── STATS / HUD BAR ── */
    #stats-bar {
      position: fixed; top: 0; left: 0; right: 0; display: none;
      font-family: 'Segoe UI', system-ui, sans-serif; font-size: 12px; color: #94a3b8;
      background: rgba(8,10,18,0.88); backdrop-filter: blur(6px);
      padding: 8px 16px; z-index: 5;
      display: none; align-items: center; gap: 12px; flex-wrap: wrap;
      pointer-events: auto; border-bottom: 1px solid #1f2433;
    }
    #stats-bar.visible { display: flex; }
    #stats-text { flex: 1; font-family: monospace; font-size: 11px; color: #64748b; }
    .hud-btn {
      padding: 5px 14px; border-radius: 7px; border: none; cursor: pointer;
      font-size: 12px; font-weight: 600;
    }
    .hud-btn-add { background: #1f2433; color: #94a3b8; }
    .hud-btn-add:hover { background: #2a3347; }
    .hud-btn-vr {
      background: linear-gradient(135deg, #3b82f6, #06b6d4);
      color: #fff;
    }
    .hud-btn-vr:hover { opacity: 0.9; }
    .hud-btn-vr:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── DISC PANEL (floating, post-load) ── */
    #disc-panel {
      position: fixed; bottom: 16px; left: 16px; z-index: 5;
      width: 220px; background: rgba(13,17,26,0.92); backdrop-filter: blur(6px);
      border: 1px solid #1f2433; border-radius: 12px;
      padding: 12px 14px; display: none; flex-direction: column; gap: 8px;
    }
    #disc-panel.floating { display: flex; }
  </style>
</head>
<body>
<canvas id="c"></canvas>

<!-- UI Overlay (pre-VR) -->
<div id="ui-overlay">
  <div class="logo">IFC VR</div>
  <div class="subtitle">Meta Quest 3 · Byggbranschen · v1.11.0</div>

  <div class="drop-zone" id="drop-zone">
    <div class="drop-icon">📐</div>
    <div class="drop-title">Ladda IFC-fil</div>
    <div class="drop-sub">Dra och släpp en eller flera .ifc-filer<br>eller klicka för att välja</div>
    <button class="drop-btn" onclick="document.getElementById('file-input').click()">Välj IFC-fil(er)</button>
    <input type="file" id="file-input" accept=".ifc" multiple/>
  </div>

  <div class="url-section">
    <div class="url-label">Eller ladda via URL (Quest 3)</div>
    <div class="url-row">
      <input type="text" id="url-input" class="url-input"
        placeholder="http://192.168.x.x:8080/FASTIGHET/A040-V-01000000.ifc"
        autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"/>
      <button class="url-btn" onclick="loadFromURL()">Ladda</button>
    </div>
    <div id="url-status" class="url-status"></div>
  </div>

</div>

<!-- Loading -->
<div id="loading">
  <div class="spinner"></div>
  <div class="load-text" id="load-text">Laddar...</div>
  <div id="prog-wrap"><div id="prog-bar"></div></div>
  <div class="load-sub" id="load-sub"></div>
</div>

<!-- HUD bar (post-load, floating over 3D canvas) -->
<div id="stats-bar">
  <span id="stats-text">0 filer · 0 mesh</span>
  <button class="hud-btn hud-btn-add" onclick="document.getElementById('file-input-hud').click()">+ Lägg till fil</button>
  <input type="file" id="file-input-hud" accept=".ifc" multiple style="display:none"/>
  <button id="vr-btn" class="hud-btn hud-btn-vr" onclick="startVR()" style="display:none">▶ Starta VR</button>
  <button class="hud-btn" onclick="runVRDiagnostics()" title="WebXR-diagnostik" style="background:#374151;color:#fbbf24;border:1px solid #fbbf24;padding:6px 10px;border-radius:6px;cursor:pointer;font-size:13px;">🔧</button>
  <span id="no-vr-msg" style="display:none;color:#f59e0b;font-size:12px;">WebXR ej stöds — öppna i Meta Browser</span>
</div>

<!-- VR Diagnostics overlay -->
<div id="diag-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:9999;overflow:auto;padding:24px;">
  <div style="max-width:700px;margin:0 auto;background:#0f1117;border:1px solid #3b82f6;border-radius:12px;padding:24px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <span style="color:#06b6d4;font-size:20px;font-weight:bold;">🔧 WebXR-diagnostik</span>
      <button onclick="document.getElementById('diag-overlay').style.display='none'" style="background:#1f2937;color:#fff;border:none;border-radius:6px;padding:6px 14px;cursor:pointer;font-size:16px;">✕ Stäng</button>
    </div>
    <pre id="diag-output" style="color:#e2e8f0;font-family:monospace;font-size:13px;line-height:1.7;white-space:pre-wrap;margin:0;">Kör diagnostik...</pre>
  </div>
</div>

<!-- Discipline panel (floating bottom-left after load) -->
<div id="disc-panel">
  <div class="disc-title">Discipliner (synlighet)</div>
  <div id="disc-rows"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════════════════
// IFC VR — v1.11.0
// v1.11.0: Mätverktyg (A→B distans) + sektionsplan (höjdjusterbart via höger joystick Y)
// v1.10.0: IFCREVOLVEDAREASOLID + IFCAXIS2PLACEMENT2D — rörböjar och svepta rotationskroppar
// v1.9.0: CSG-håltagning via IFCRELVOIDSELEMENT — väggar/bjälklag får dörr- och fönsteröppningar
// v1.8.0: InstancedMesh för IFCMAPPEDITEM — delade geometrier renderas som en draw call per grupp
// v1.7.0: skala-toggle 1:1 ↔ miniatyr (0.5 m) via VR-menyn; modell placeras framför spelaren i mini-läge
// v1.6.0: playerRig — kamera+kontroller under en rig-grupp; snap-turn pivoterar runt spelaren (bug 1.3),
//         locomotion+teleport flyttar riggen (bug 1.3/1.4), initial VR-pose 2.5 m framför modellen (bug 1.5)
// v1.5.0: updateInfoPanel i frame-loop (bug 1.2), handleVRMenuTrigger vid vänster trigger (bug 1.1),
//         Återställ modellposition-knapp i VR-menyn, cleanup av VR-objekt vid onXREnd
// v1.4.0: IFCSHELLBASEDSURFACEMODEL + SurfaceModel repType (V157 ventilation)
// v1.3.0: IFCCARTESIANTRANSFORMATIONOPERATOR3DNONUNIFORM per-axis scale fix
// WebXR viewer for Meta Quest 3 — built on IFC parser from ifc-viewer-v2.7.1
// v1.1.0: MESH_BUDGET 20000 (bort från filstorleksgräns), smooth shading via vertex-dedup,
//         SEGS rör 6→16, SEGS cirkelprofil 10→16
// ═══════════════════════════════════════════════════════════════════════════

// ── GLOBALS ────────────────────────────────────────────────────────────────
let scene, camera, renderer, xrSession = null;
let ifcRoot;          // Group: Z-up→Y-up rotation
let modelBox = new THREE.Box3();
let meshMap = {};     // meshKey → THREE.Mesh
let UNIT_SCALE = 0.001;

// Multi-file state
const loadedFiles = [];
let nextFileId = 1;

// Player rig — XR camera + controllers live here; move rig, never the model
let playerRig = null;
let vrRigInitialized = false; // true once XR camera is parented to rig

// Controllers & hands
let controllers = [];
let controllerGrips = [];
let tempMatrix = new THREE.Matrix4();
const raycaster = new THREE.Raycaster();

// Locomotion
let teleportTarget = null;
let teleportMarker = null;
let teleportReady = false;
let joystickActive = false;
let playerHeight = 1.65; // metres

// VR UI state
let vrMenuOpen = false;
let vrMenuGroup = null;
let selectedMesh = null, selectedInstanceId = null;
let infoPanel = null;
let disciplineVisible = {};
let scaleMode = 'full'; // 'full' = 1:1 walk-through | 'mini' = 0.5 m miniatyr
// v1.11.0: Mätverktyg
let measureMode = false;
let measureA = null, measureB = null; // THREE.Vector3 i världsrymden
let measureGroup = null;              // THREE.Group med sfärer, linje, label
// v1.11.0: Sektionsplan
let sectionMode = false;
let sectionHeight = 1.2;             // meter i Three.js Y-up världsrymd
let sectionPlane = new THREE.Plane(new THREE.Vector3(0, -1, 0), 1.2); // klipper y > sectionHeight

const DISCIPLINES = {
  A:    { name: 'Arkitektur',      color: '#94a3b8' },
  K:    { name: 'Konstruktion',    color: '#a8a29e' },
  V:    { name: 'Ventilation',     color: '#06b6d4' },
  VS:   { name: 'Värme & Sanitet', color: '#f97316' },
  VVS:  { name: 'VVS',             color: '#ef4444' },
  SPR:  { name: 'Sprinkler',       color: '#dc2626' },
  KYLA: { name: 'Kyla',            color: '#3b82f6' },
  VA:   { name: 'Vatten & Avlopp', color: '#0891b2' },
  EL:   { name: 'El',              color: '#eab308' },
  '?':  { name: 'Okänd',           color: '#cbd5e1' }
};

const DISCIPLINE_ALIASES = { W: 'VS' };

function detectDiscipline(filename) {
  const base = filename.replace(/\.ifc$/i, '').toUpperCase();
  const m = base.match(/^([A-Z]+)[-_]/);
  if (m) {
    const key = DISCIPLINE_ALIASES[m[1]] || m[1];
    if (DISCIPLINES[key]) return key;
  }
  const single = base.match(/^([A-Z]{1,4})/);
  if (single) {
    const key = DISCIPLINE_ALIASES[single[1]] || single[1];
    if (DISCIPLINES[key]) return key;
  }
  return '?';
}

const TYPE_COLORS = {
  IFCWALL:'#94a3b8', IFCWALLSTANDARDCASE:'#94a3b8', IFCSLAB:'#64748b',
  IFCROOF:'#475569', IFCDOOR:'#f59e0b', IFCWINDOW:'#38bdf8',
  IFCCOLUMN:'#a78bfa', IFCBEAM:'#c084fc', IFCSTAIR:'#fb923c',
  IFCSTAIRFLIGHT:'#f97316', IFCRAMP:'#fdba74', IFCFURNISHINGELEMENT:'#86efac',
  IFCSPACE:'#63b3ed', IFCFLOWSEGMENT:'#38bdf8', IFCFLOWFITTING:'#7dd3fc',
  IFCDUCTFITTING:'#7dd3fc', IFCDUCTSEGMENT:'#38bdf8',
  IFCPIPESEGMENT:'#4ade80', IFCPIPEFITTING:'#86efac',
  IFCPLATE:'#a8a29e', IFCMEMBER:'#c084fc', IFCCOVERING:'#78716c',
  IFCBUILDINGELEMENTPROXY:'#6b7280', IFCFLOWTERMINAL:'#06b6d4',
  IFCSANITARYTERMINAL:'#0ea5e9', IFCFLOWCONTROLLER:'#fb923c',
  IFCENERGYCONVERSIONDEVICE:'#a78bfa', IFCCURTAINWALL:'#60a5fa',
  IFCRAILING:'#a1a1aa', IFCLIGHTFIXTURE:'#fde047', IFCFOOTING:'#57534e',
  DEFAULT:'#cbd5e1'
};

// ── INIT THREE.JS ───────────────────────────────────────────────────────────
function initThree() {
  const canvas = document.getElementById('c');
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x080a0e);

  camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 10000);
  camera.position.set(0, playerHeight, 5);

  renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.xr.enabled = true;
  renderer.localClippingEnabled = true; // v1.11.0: needed for per-material section plane
  renderer.shadowMap.enabled = false; // Performance: no shadows on Quest

  // Lighting — bright for VR readability
  scene.add(new THREE.AmbientLight(0xffffff, 0.7));
  const sun = new THREE.DirectionalLight(0xffffff, 1.0);
  sun.position.set(10, 20, 10);
  scene.add(sun);
  const fill = new THREE.DirectionalLight(0x8aa8d0, 0.3);
  fill.position.set(-5, -5, -5);
  scene.add(fill);
  scene.add(new THREE.HemisphereLight(0x334466, 0x1a1a2e, 0.4));

  // Floor grid
  const grid = new THREE.GridHelper(200, 40, 0x1f2433, 0x161a26);
  scene.add(grid);

  // IFC root: IFC = Z-up, Three.js = Y-up — never moved after model load
  ifcRoot = new THREE.Group();
  ifcRoot.rotation.x = -Math.PI / 2;
  scene.add(ifcRoot);

  // Player rig: camera + controllers live here; locomotion moves this group
  playerRig = new THREE.Group();
  playerRig.position.set(0, 0, 10);
  scene.add(playerRig);

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  renderer.setAnimationLoop(onXRFrame);
  setupOrbit();
}

// ── XR FRAME LOOP ──────────────────────────────────────────────────────────
function onXRFrame(time, frame) {
  renderer.render(scene, camera);

  if (!frame) return; // not in XR yet

  // On the first XR frame, parent the XR camera to the player rig so that
  // playerRig.position/rotation becomes the player's reference frame.
  if (!vrRigInitialized) {
    vrRigInitialized = true;
    const xrCam = renderer.xr.getCamera(camera);
    if (xrCam.parent !== playerRig) playerRig.add(xrCam);
  }

  updateInfoPanel();
  processControllerInput(frame);
}

// ── START VR ───────────────────────────────────────────────────────────────
async function startVR() {
  if (!navigator.xr) { alert('WebXR ej tillgängligt.'); return; }
  // content:// and file:// URLs are blocked for immersive-VR on Meta Browser.
  // The file must be served over HTTPS (GitHub Pages, Netlify, etc.)
  if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
    alert(
      'VR kräver HTTPS.\n\n' +
      'Filen är öppnad som lokal fil (content:// eller file://) vilket Meta Browser ' +
      'blockerar för VR.\n\n' +
      'Lösning:\n' +
      '1. Ladda upp filen till GitHub Pages eller Netlify (gratis)\n' +
      '2. Öppna den HTTPS-länken i Meta Browser\n\n' +
      'GitHub Pages: github.com → New repo → Upload file → Settings → Pages → Deploy'
    );
    return;
  }
  try {
    // NOTE: Do NOT await isSessionSupported here — it consumes the user gesture on
    // Meta Browser, causing requestSession to fail regardless of features.
    xrSession = await navigator.xr.requestSession('immersive-vr', {
      requiredFeatures: ['local-floor'],
      optionalFeatures: ['hand-tracking']
    });
    renderer.xr.setSession(xrSession);
    document.getElementById('ui-overlay').classList.add('hidden');
    document.getElementById('stats-bar').classList.add('visible');
    vrRigInitialized = false;
    positionPlayerForVR();
    setupControllers();
    buildTeleportMarker();
    buildVRMenu();
    xrSession.addEventListener('end', onXREnd);
  } catch(e) {
    console.error('XR start error:', e);
    const isQuest = navigator.userAgent.includes('Quest');
    const hint = isQuest
      ? '\n\nQuest-tips: Headsetet måste vara på huvudet när du trycker Starta VR (proximity-sensorn måste registrera ansiktet).'
      : '';
    alert('Kunde inte starta VR: ' + e.message + hint);
  }
}

function onXREnd() {
  xrSession = null;
  // Remove XR camera from rig before session tears down
  const xrCam = renderer.xr.getCamera(camera);
  if (xrCam.parent === playerRig) playerRig.remove(xrCam);
  vrRigInitialized = false;
  document.getElementById('ui-overlay').classList.remove('hidden');
  document.getElementById('stats-bar').classList.remove('visible');
  cleanupControllers();
  if (teleportMarker) { scene.remove(teleportMarker); teleportMarker = null; }
  if (vrMenuGroup) { scene.remove(vrMenuGroup); vrMenuGroup = null; vrMenuOpen = false; }
  if (infoPanel) { scene.remove(infoPanel); infoPanel = null; }
  clearMeasurement(); measureMode = false;
  if (sectionMode) { sectionMode = false; applySection(); }
  selectedMesh = null;
}

// Place the player rig so the model centre is ~3 m in front at start of session
function positionPlayerForVR() {
  renderer.render(scene, camera); // ensure matrixWorld is current
  const box = computeSceneBox();
  if (box.isEmpty()) {
    playerRig.position.set(0, 0, 10);
    playerRig.rotation.set(0, 0, 0);
    return;
  }
  const center = new THREE.Vector3();
  box.getCenter(center);
  const size = new THREE.Vector3();
  box.getSize(size);
  const halfDepth = Math.max(size.x, size.z) * 0.5;
  playerRig.position.set(center.x, 0, center.z + halfDepth + 2.5);
  playerRig.rotation.set(0, 0, 0);
}

// ── CONTROLLERS ─────────────────────────────────────────────────────────────
function setupControllers() {
  for (let i = 0; i < 2; i++) {
    const ctrl = renderer.xr.getController(i);
    ctrl.userData.index = i;
    ctrl.userData.isSelecting = false;
    ctrl.userData.wasTrigger = false;
    ctrl.userData.wasGrip = false;
    ctrl.userData.wasMenu = false;

    // Ray visual
    const rayGeo = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(0, 0, 0),
      new THREE.Vector3(0, 0, -1)
    ]);
    const rayMat = new THREE.LineBasicMaterial({ color: 0x06b6d4, linewidth: 1 });
    const ray = new THREE.Line(rayGeo, rayMat);
    ray.name = 'ray';
    ray.scale.z = 5;
    ctrl.add(ray);

    playerRig.add(ctrl);
    controllers.push(ctrl);

    // Grip (controller model placeholder)
    const grip = renderer.xr.getControllerGrip(i);
    const gripGeo = new THREE.CylinderGeometry(0.015, 0.025, 0.12, 8);
    const gripMat = new THREE.MeshStandardMaterial({ color: 0x222233 });
    grip.add(new THREE.Mesh(gripGeo, gripMat));
    playerRig.add(grip);
    controllerGrips.push(grip);
  }
}

function cleanupControllers() {
  controllers.forEach(c => playerRig.remove(c));
  controllerGrips.forEach(g => playerRig.remove(g));
  controllers = [];
  controllerGrips = [];
}

// ── CONTROLLER INPUT ────────────────────────────────────────────────────────
function processControllerInput(frame) {
  const session = renderer.xr.getSession();
  if (!session) return;

  for (const source of session.inputSources) {
    if (!source.gamepad) continue;
    const gp = source.gamepad;
    const ctrl = controllers[source.handedness === 'left' ? 0 : 1];
    if (!ctrl) continue;

    const idx = ctrl.userData.index;
    const hand = source.handedness; // 'left' | 'right'

    // Buttons: 0=trigger, 1=grip, 3=thumbstick press, 4=X/A, 5=Y/B
    const trigger   = gp.buttons[0]?.pressed ?? false;
    const grip      = gp.buttons[1]?.pressed ?? false;
    const menuBtn   = gp.buttons[4]?.pressed ?? false; // X (left) / A (right)

    // Axes: 2=thumbstick X, 3=thumbstick Y
    const axisX = gp.axes[2] ?? 0;
    const axisY = gp.axes[3] ?? 0;

    // ── RIGHT HAND: Teleport (trigger to aim, release to jump) ──────────
    if (hand === 'right') {
      updateTeleportRay(ctrl, trigger);

      if (!trigger && ctrl.userData.wasTrigger && teleportReady) {
        executeTeleport();
      }

      // Right joystick Y: adjust section height when section is active
      if (sectionMode && Math.abs(axisY) > 0.3) {
        sectionHeight = Math.max(0, Math.min(50, sectionHeight - axisY * 0.02));
        sectionPlane.constant = sectionHeight;
        rebuildVRMenuContent();
      }

      // Right joystick X: snap-turn — rotate playerRig around camera's foot position
      if (Math.abs(axisX) > 0.7 && !ctrl.userData.snapTurning) {
        ctrl.userData.snapTurning = true;
        const angle = axisX > 0 ? -Math.PI / 6 : Math.PI / 6; // 30° snap
        const xrCam = renderer.xr.getCamera(camera);
        const camWorld = new THREE.Vector3();
        xrCam.getWorldPosition(camWorld);
        const px = camWorld.x, pz = camWorld.z; // pivot at camera XZ
        const cos = Math.cos(angle), sin = Math.sin(angle);
        const dx = playerRig.position.x - px;
        const dz = playerRig.position.z - pz;
        playerRig.position.x = px + dx * cos - dz * sin;
        playerRig.position.z = pz + dx * sin + dz * cos;
        playerRig.rotation.y += angle;
      } else if (Math.abs(axisX) < 0.3) {
        ctrl.userData.snapTurning = false;
      }

      ctrl.userData.wasTrigger = trigger;
    }

    // ── LEFT HAND: Smooth locomotion (joystick) + Menu (X button) ───────
    if (hand === 'left') {
      // Smooth locomotion — move playerRig in world XZ
      if (Math.abs(axisX) > 0.1 || Math.abs(axisY) > 0.1) {
        const xrCamera = renderer.xr.getCamera(camera);
        const forward = new THREE.Vector3();
        xrCamera.getWorldDirection(forward);
        forward.y = 0; forward.normalize();
        const right = new THREE.Vector3();
        right.crossVectors(forward, new THREE.Vector3(0, 1, 0)).normalize();

        const speed = 0.05;
        playerRig.position.addScaledVector(forward, -axisY * speed);
        playerRig.position.addScaledVector(right,    axisX * speed);
        playerRig.position.y = 0; // keep rig on the floor plane
      }

      // X button = toggle VR menu
      if (menuBtn && !ctrl.userData.wasMenu) {
        toggleVRMenu(ctrl);
      }
      ctrl.userData.wasMenu = menuBtn;

      // Trigger on left = menu / measure / select (priority order)
      if (trigger && !ctrl.userData.wasTrigger) {
        if (vrMenuOpen) {
          handleVRMenuTrigger(ctrl);
        } else if (measureMode) {
          placeMeasurePoint(ctrl);
        } else {
          selectObjectWithRay(ctrl);
        }
      }
      ctrl.userData.wasTrigger = trigger;
    }
  }

  updateStats();
}

// ── TELEPORT ─────────────────────────────────────────────────────────────────
function buildTeleportMarker() {
  const group = new THREE.Group();
  const ring = new THREE.Mesh(
    new THREE.RingGeometry(0.25, 0.35, 32),
    new THREE.MeshBasicMaterial({ color: 0x06b6d4, side: THREE.DoubleSide, transparent: true, opacity: 0.8 })
  );
  ring.rotation.x = -Math.PI / 2;
  group.add(ring);

  const dot = new THREE.Mesh(
    new THREE.CircleGeometry(0.06, 16),
    new THREE.MeshBasicMaterial({ color: 0x06b6d4, side: THREE.DoubleSide })
  );
  dot.rotation.x = -Math.PI / 2;
  dot.position.y = 0.002;
  group.add(dot);

  group.visible = false;
  scene.add(group);
  teleportMarker = group;
}

function updateTeleportRay(ctrl, triggerDown) {
  const ray = ctrl.getObjectByName('ray');
  if (!triggerDown) {
    if (teleportMarker) teleportMarker.visible = false;
    if (ray) { ray.material.color.set(0x06b6d4); ray.scale.z = 5; }
    teleportReady = false;
    return;
  }

  // Cast a curved arc downward
  ctrl.getWorldPosition(_v0);
  ctrl.getWorldDirection(_v1);
  _v1.negate();

  // Simple parabola: sample N points along arc
  const gravity = new THREE.Vector3(0, -9.8, 0);
  const vel = _v1.clone().multiplyScalar(8);
  const dt = 0.04;
  let pos = _v0.clone();
  let landed = false;

  for (let i = 0; i < 30; i++) {
    vel.addScaledVector(gravity, dt);
    pos.addScaledVector(vel, dt);
    if (pos.y < 0.01) {
      pos.y = 0;
      landed = true;
      break;
    }
  }

  teleportReady = landed;
  if (teleportMarker) {
    teleportMarker.visible = landed;
    if (landed) teleportMarker.position.copy(pos);
  }
  if (ray) {
    ray.material.color.set(landed ? 0x06b6d4 : 0xff4444);
    // Point ray toward land point
    const len = _v0.distanceTo(pos);
    ray.scale.z = len;
  }
}

function executeTeleport() {
  if (!teleportMarker || !teleportMarker.visible) return;
  const dest = teleportMarker.position.clone();
  const xrCamera = renderer.xr.getCamera(camera);
  const camPos = new THREE.Vector3();
  xrCamera.getWorldPosition(camPos);
  // Move rig so camera XZ lands on dest
  const delta = new THREE.Vector3(dest.x - camPos.x, 0, dest.z - camPos.z);
  playerRig.position.add(delta);
  teleportMarker.visible = false;
  teleportReady = false;
}

function resetModelPosition() {
  if (scaleMode === 'mini') {
    // Re-place mini model in front of current player position
    ifcRoot.scale.set(1, 1, 1);
    ifcRoot.position.set(0, 0, 0);
    enterMiniMode();
  } else {
    positionPlayerForVR();
  }
  vrMenuOpen = false;
  if (vrMenuGroup) vrMenuGroup.visible = false;
}

function toggleScaleMode() {
  if (scaleMode === 'full') {
    enterMiniMode();
  } else {
    enterFullMode();
  }
  vrMenuOpen = false;
  if (vrMenuGroup) vrMenuGroup.visible = false;
  rebuildVRMenuContent();
}

function enterMiniMode() {
  scaleMode = 'mini';

  // Compute bounds at full scale
  const box = computeSceneBox();
  if (box.isEmpty()) return;
  const size = new THREE.Vector3();
  box.getSize(size);
  const maxDim = Math.max(size.x, size.y, size.z);
  if (maxDim === 0) return;

  // Shrink to 0.5 m max dimension
  const miniScale = 0.5 / maxDim;
  ifcRoot.scale.setScalar(miniScale);

  // Compute center at mini scale and place 0.7 m ahead of player, 0.9 m high
  const miniBox = computeSceneBox();
  const miniCenter = new THREE.Vector3();
  miniBox.getCenter(miniCenter);

  // Player forward from rig yaw (rig default looks in -Z)
  const fwd = new THREE.Vector3(0, 0, -1)
    .applyEuler(new THREE.Euler(0, playerRig.rotation.y, 0));

  const tx = playerRig.position.x + fwd.x * 0.7;
  const tz = playerRig.position.z + fwd.z * 0.7;
  const ty = 0.9; // table height

  ifcRoot.position.x += tx - miniCenter.x;
  ifcRoot.position.y += ty - miniCenter.y;
  ifcRoot.position.z += tz - miniCenter.z;

  // Hide floor grid — it looks wrong at miniatyr scale
  scene.children.forEach(c => { if (c.isGridHelper) c.visible = false; });
}

function enterFullMode() {
  scaleMode = 'full';
  ifcRoot.scale.set(1, 1, 1);
  ifcRoot.position.set(0, 0, 0);
  scene.children.forEach(c => { if (c.isGridHelper) c.visible = true; });
  positionPlayerForVR();
}

const _v0 = new THREE.Vector3();
const _v1 = new THREE.Vector3();

// ── OBJECT SELECTION ─────────────────────────────────────────────────────────
function selectObjectWithRay(ctrl) {
  tempMatrix.identity().extractRotation(ctrl.matrixWorld);
  raycaster.ray.origin.setFromMatrixPosition(ctrl.matrixWorld);
  raycaster.ray.direction.set(0, 0, -1).applyMatrix4(tempMatrix);

  const meshes = Object.values(meshMap).filter(m => m.visible);
  const hits = raycaster.intersectObjects(meshes, false);
  if (!hits.length) {
    clearSelection();
    return;
  }

  const hit = hits[0];
  const mesh = hit.object;

  // Deselect previous
  if (selectedMesh && selectedMesh !== mesh) {
    if (selectedMesh.userData._origColor !== undefined)
      selectedMesh.material.color.setHex(selectedMesh.userData._origColor);
  }

  selectedMesh = mesh;
  selectedMesh.userData._origColor = selectedMesh.material.color.getHex();
  selectedMesh.material.color.set(0x60a5fa); // highlight blue

  // Show info panel near hit point
  showVRInfo(mesh, hit.point);
}

function clearSelection() {
  if (selectedMesh) {
    if (selectedMesh.userData._origColor !== undefined)
      selectedMesh.material.color.setHex(selectedMesh.userData._origColor);
    selectedMesh = null;
  }
  if (infoPanel) { scene.remove(infoPanel); infoPanel = null; }
}

// ── VR INFO PANEL (floating text) ───────────────────────────────────────────
function showVRInfo(mesh, hitPoint) {
  if (infoPanel) { scene.remove(infoPanel); infoPanel = null; }

  const ud = mesh.userData;
  const type = ud.type || '?';
  const name = ud.name || '—';
  const disc = ud.discipline || '?';
  const discName = DISCIPLINES[disc]?.name || disc;

  const canvas = document.createElement('canvas');
  canvas.width = 512; canvas.height = 256;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = 'rgba(13,15,20,0.95)';
  roundRect(ctx, 0, 0, 512, 256, 16);
  ctx.fill();
  ctx.strokeStyle = '#3b82f6';
  ctx.lineWidth = 3;
  roundRect(ctx, 0, 0, 512, 256, 16);
  ctx.stroke();

  ctx.font = 'bold 22px sans-serif';
  ctx.fillStyle = '#06b6d4';
  ctx.fillText(formatTypeName(type), 20, 44);

  ctx.font = '18px sans-serif';
  ctx.fillStyle = '#e2e8f0';
  ctx.fillText(name.substring(0, 38), 20, 80);

  ctx.font = '16px sans-serif';
  ctx.fillStyle = '#94a3b8';
  ctx.fillText('Disciplin: ' + discName, 20, 116);
  ctx.fillText('IFC-typ: ' + type, 20, 148);

  ctx.font = '13px monospace';
  ctx.fillStyle = '#475569';
  ctx.fillText('← Vänster trigger = välj objekt', 20, 200);
  ctx.fillText('← X-knapp = meny', 20, 228);

  const tex = new THREE.CanvasTexture(canvas);
  const mat = new THREE.MeshBasicMaterial({ map: tex, transparent: true, depthTest: false, side: THREE.DoubleSide });
  const geo = new THREE.PlaneGeometry(0.6, 0.3);
  infoPanel = new THREE.Mesh(geo, mat);

  // Position panel facing camera, above hit point
  infoPanel.position.copy(hitPoint);
  infoPanel.position.y += 0.5;
  infoPanel.renderOrder = 999;

  scene.add(infoPanel);
}

// Update info panel to always face camera
function updateInfoPanel() {
  if (!infoPanel) return;
  const xrCamera = renderer.xr.getCamera(camera);
  infoPanel.lookAt(xrCamera.getWorldPosition(new THREE.Vector3()));
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ── VR MENU ──────────────────────────────────────────────────────────────────
function buildVRMenu() {
  vrMenuGroup = new THREE.Group();
  vrMenuGroup.visible = false;
  scene.add(vrMenuGroup);
  rebuildVRMenuContent();
}

function toggleVRMenu(ctrl) {
  vrMenuOpen = !vrMenuOpen;
  vrMenuGroup.visible = vrMenuOpen;

  if (vrMenuOpen) {
    // Position menu in front of left controller
    const pos = new THREE.Vector3();
    ctrl.getWorldPosition(pos);
    const dir = new THREE.Vector3();
    ctrl.getWorldDirection(dir);
    vrMenuGroup.position.copy(pos).addScaledVector(dir, -0.4);
    vrMenuGroup.position.y += 0.1;
    vrMenuGroup.quaternion.copy(ctrl.quaternion);
  }
}

function rebuildVRMenuContent() {
  // Clear old
  while (vrMenuGroup.children.length) {
    const c = vrMenuGroup.children[0];
    vrMenuGroup.remove(c);
    if (c.geometry) c.geometry.dispose();
    if (c.material?.map) c.material.map.dispose();
    if (c.material) c.material.dispose();
  }

  const allDiscs = Object.keys(disciplineVisible);
  if (!allDiscs.length) {
    // No files loaded yet
    const cv = makeMenuCanvas('Ingen fil laddad', []);
    const tex = new THREE.CanvasTexture(cv);
    const mat = new THREE.MeshBasicMaterial({ map: tex, transparent: true, side: THREE.DoubleSide });
    vrMenuGroup.add(new THREE.Mesh(new THREE.PlaneGeometry(0.5, 0.3), mat));
    return;
  }

  const cv = makeMenuCanvas('Discipliner', allDiscs.map(d => ({
    key: d,
    name: DISCIPLINES[d]?.name || d,
    color: DISCIPLINES[d]?.color || '#888',
    on: disciplineVisible[d] !== false
  })));
  const tex = new THREE.CanvasTexture(cv);
  const mat = new THREE.MeshBasicMaterial({ map: tex, transparent: true, depthTest: false, side: THREE.DoubleSide });
  const planeH = cv.height * (0.6 / 512);
  const mesh = new THREE.Mesh(new THREE.PlaneGeometry(0.6, planeH), mat);
  mesh.userData.isVRMenu = true;
  mesh.userData.menuType = 'discToggles';
  vrMenuGroup.add(mesh);
}

const MENU_RESET_Y   = 58;
const MENU_RESET_H   = 42;
const MENU_SCALE_Y   = MENU_RESET_Y   + MENU_RESET_H   + 6;  // 106
const MENU_SCALE_H   = 42;
const MENU_MEASURE_Y = MENU_SCALE_Y   + MENU_SCALE_H   + 6;  // 154  v1.11.0
const MENU_MEASURE_H = 42;
const MENU_SECTION_Y = MENU_MEASURE_Y + MENU_MEASURE_H  + 6;  // 202  v1.11.0
const MENU_SECTION_H = 42;
const MENU_DISC_START = MENU_SECTION_Y + MENU_SECTION_H + 10; // 254

function makeMenuCanvas(title, rows) {
  const w = 512;
  const h = rows.length ? MENU_DISC_START + rows.length * 46 + 20 : MENU_DISC_START + 20;
  const cv = document.createElement('canvas');
  cv.width = w; cv.height = h;
  const ctx = cv.getContext('2d');
  ctx.fillStyle = 'rgba(13,15,20,0.97)';
  roundRect(ctx, 0, 0, w, h, 16); ctx.fill();
  ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 2;
  roundRect(ctx, 0, 0, w, h, 16); ctx.stroke();

  ctx.font = 'bold 24px sans-serif';
  ctx.fillStyle = '#06b6d4';
  ctx.fillText(title, 20, 44);

  // Reset position button
  ctx.fillStyle = '#1a2030';
  roundRect(ctx, 16, MENU_RESET_Y, w - 32, MENU_RESET_H, 8); ctx.fill();
  ctx.strokeStyle = '#334155'; ctx.lineWidth = 1;
  roundRect(ctx, 16, MENU_RESET_Y, w - 32, MENU_RESET_H, 8); ctx.stroke();
  ctx.font = '18px sans-serif';
  ctx.fillStyle = '#94a3b8';
  ctx.fillText('↩  Återställ position', 36, MENU_RESET_Y + 26);

  // Scale toggle button — label reflects what pressing it will DO
  const scaleLabel = scaleMode === 'full' ? '⊞  Miniatyrskala' : '⊟  1:1  Walk-through';
  ctx.fillStyle = scaleMode === 'mini' ? '#1a2d20' : '#1a2030'; // tinted green in mini
  roundRect(ctx, 16, MENU_SCALE_Y, w - 32, MENU_SCALE_H, 8); ctx.fill();
  ctx.strokeStyle = scaleMode === 'mini' ? '#1e4d2e' : '#334155'; ctx.lineWidth = 1;
  roundRect(ctx, 16, MENU_SCALE_Y, w - 32, MENU_SCALE_H, 8); ctx.stroke();
  ctx.font = '18px sans-serif';
  ctx.fillStyle = scaleMode === 'mini' ? '#4ade80' : '#94a3b8';
  ctx.fillText(scaleLabel, 36, MENU_SCALE_Y + 26);

  // Measure tool button
  const measureLabel = measureMode ? '⊙  Mätverktyg — AV' : '⊙  Mätverktyg — PÅ';
  ctx.fillStyle = measureMode ? '#1a2d20' : '#1a2030';
  roundRect(ctx, 16, MENU_MEASURE_Y, w - 32, MENU_MEASURE_H, 8); ctx.fill();
  ctx.strokeStyle = measureMode ? '#1e4d2e' : '#334155'; ctx.lineWidth = 1;
  roundRect(ctx, 16, MENU_MEASURE_Y, w - 32, MENU_MEASURE_H, 8); ctx.stroke();
  ctx.font = '18px sans-serif';
  ctx.fillStyle = measureMode ? '#4ade80' : '#94a3b8';
  ctx.fillText(measureLabel, 36, MENU_MEASURE_Y + 26);

  // Section plane button
  const sectionLabel = sectionMode
    ? `⊠  Sektion AV  (${sectionHeight.toFixed(1)} m)`
    : '⊡  Sektion PÅ';
  ctx.fillStyle = sectionMode ? '#1a2030' : '#1a2030';
  roundRect(ctx, 16, MENU_SECTION_Y, w - 32, MENU_SECTION_H, 8); ctx.fill();
  ctx.strokeStyle = sectionMode ? '#f59e0b' : '#334155'; ctx.lineWidth = 1;
  roundRect(ctx, 16, MENU_SECTION_Y, w - 32, MENU_SECTION_H, 8); ctx.stroke();
  ctx.font = '18px sans-serif';
  ctx.fillStyle = sectionMode ? '#fbbf24' : '#94a3b8';
  ctx.fillText(sectionLabel, 36, MENU_SECTION_Y + 26);

  rows.forEach((r, i) => {
    const y = MENU_DISC_START + i * 46;
    ctx.fillStyle = r.color;
    ctx.fillRect(16, y + 4, 14, 28);

    ctx.font = '20px sans-serif';
    ctx.fillStyle = r.on ? '#e2e8f0' : '#475569';
    ctx.fillText(r.name, 40, y + 24);

    // Toggle indicator
    ctx.fillStyle = r.on ? '#3b82f6' : '#1f2433';
    roundRect(ctx, w - 70, y + 4, 50, 28, 10); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = '16px sans-serif';
    ctx.fillText(r.on ? 'PÅ' : 'AV', w - 58, y + 24);
  });

  return cv;
}

// Handle trigger press on VR menu items
function handleVRMenuTrigger(ctrl) {
  if (!vrMenuOpen || !vrMenuGroup.visible) return;
  tempMatrix.identity().extractRotation(ctrl.matrixWorld);
  raycaster.ray.origin.setFromMatrixPosition(ctrl.matrixWorld);
  raycaster.ray.direction.set(0, 0, -1).applyMatrix4(tempMatrix);

  const menuMeshes = vrMenuGroup.children.filter(c => c.userData.isVRMenu);
  const hits = raycaster.intersectObjects(menuMeshes, false);
  if (!hits.length) return;

  const hit = hits[0];
  const uv = hit.uv;
  if (!uv) return;

  // Map UV to canvas coords
  const cvW = 512;
  const x = uv.x * cvW;
  const cvH = hit.object.geometry.parameters.height * (512 / 0.6);
  const y = (1 - uv.y) * cvH;

  // Reset button
  if (y >= MENU_RESET_Y && y < MENU_RESET_Y + MENU_RESET_H) {
    resetModelPosition();
    return;
  }

  // Scale toggle button
  if (y >= MENU_SCALE_Y && y < MENU_SCALE_Y + MENU_SCALE_H) {
    toggleScaleMode();
    return;
  }

  // Measure tool button
  if (y >= MENU_MEASURE_Y && y < MENU_MEASURE_Y + MENU_MEASURE_H) {
    toggleMeasureMode();
    return;
  }

  // Section plane button
  if (y >= MENU_SECTION_Y && y < MENU_SECTION_Y + MENU_SECTION_H) {
    toggleSectionMode();
    return;
  }

  // Detect which discipline row was tapped
  const allDiscs = Object.keys(disciplineVisible);
  const rowH = 46;
  const row = Math.floor((y - MENU_DISC_START) / rowH);
  if (row >= 0 && row < allDiscs.length) {
    const disc = allDiscs[row];
    disciplineVisible[disc] = !(disciplineVisible[disc] !== false);
    refreshDisciplineVisibility();
    rebuildVRMenuContent();
  }
}

// ── MEASURE TOOL (v1.11.0) ────────────────────────────────────────────────────
function toggleMeasureMode() {
  measureMode = !measureMode;
  if (!measureMode) clearMeasurement();
  vrMenuOpen = false;
  if (vrMenuGroup) vrMenuGroup.visible = false;
  rebuildVRMenuContent();
}

function clearMeasurement() {
  measureA = null; measureB = null;
  if (measureGroup) { scene.remove(measureGroup); measureGroup = null; }
}

function placeMeasurePoint(ctrl) {
  tempMatrix.identity().extractRotation(ctrl.matrixWorld);
  raycaster.ray.origin.setFromMatrixPosition(ctrl.matrixWorld);
  raycaster.ray.direction.set(0, 0, -1).applyMatrix4(tempMatrix);

  const targets = [];
  ifcRoot.traverse(c => { if (c.isMesh && c.visible) targets.push(c); });
  const hits = raycaster.intersectObjects(targets, false);
  if (!hits.length) return;

  const pt = hits[0].point.clone();

  if (measureA === null) {
    measureA = pt;
    _addMeasureSphere(pt, 0x22c55e);
  } else if (measureB === null) {
    measureB = pt;
    _addMeasureSphere(pt, 0xfbbf24);
    _showMeasureLine();
  } else {
    clearMeasurement(); // third press resets
  }
}

function _addMeasureSphere(pt, color) {
  if (!measureGroup) { measureGroup = new THREE.Group(); scene.add(measureGroup); }
  const m = new THREE.Mesh(
    new THREE.SphereGeometry(0.025, 8, 8),
    new THREE.MeshBasicMaterial({ color, depthTest: false })
  );
  m.position.copy(pt);
  measureGroup.add(m);
}

function _showMeasureLine() {
  if (!measureA || !measureB || !measureGroup) return;
  const dist = measureA.distanceTo(measureB);

  const lineGeo = new THREE.BufferGeometry().setFromPoints([measureA, measureB]);
  measureGroup.add(new THREE.Line(lineGeo,
    new THREE.LineBasicMaterial({ color: 0xfbbf24, depthTest: false })));

  // Canvas label
  const cv = document.createElement('canvas');
  cv.width = 256; cv.height = 64;
  const ctx = cv.getContext('2d');
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, 0, 256, 64);
  ctx.font = 'bold 30px sans-serif';
  ctx.fillStyle = '#fbbf24';
  ctx.textAlign = 'center';
  ctx.fillText(`${dist.toFixed(2)} m`, 128, 44);
  const sprite = new THREE.Sprite(
    new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(cv), depthTest: false })
  );
  sprite.scale.set(0.5, 0.125, 1);
  sprite.position.copy(measureA).lerp(measureB, 0.5);
  sprite.position.y += 0.08;
  measureGroup.add(sprite);
}

function applySection() {
  const planes = sectionMode ? [sectionPlane] : [];
  ifcRoot.traverse(child => {
    if (!child.material) return;
    const mats = Array.isArray(child.material) ? child.material : [child.material];
    mats.forEach(m => { m.clippingPlanes = planes; });
  });
}

// ── FILE DROP & LOAD ─────────────────────────────────────────────────────────
function setupFileDrop() {
  const zone = document.getElementById('drop-zone');
  const input = document.getElementById('file-input');
  const inputHud = document.getElementById('file-input-hud');

  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
  zone.addEventListener('drop', e => {
    e.preventDefault(); zone.classList.remove('dragover');
    const files = [...e.dataTransfer.files].filter(f => f.name.toLowerCase().endsWith('.ifc'));
    if (files.length) loadFiles(files);
  });
  // Also allow drop on whole body when overlay is hidden
  document.body.addEventListener('dragover', e => { e.preventDefault(); });
  document.body.addEventListener('drop', e => {
    e.preventDefault();
    const files = [...e.dataTransfer.files].filter(f => f.name.toLowerCase().endsWith('.ifc'));
    if (files.length) loadFiles(files);
  });
  input.addEventListener('change', () => {
    const files = [...input.files].filter(f => f.name.toLowerCase().endsWith('.ifc'));
    if (files.length) loadFiles(files);
    input.value = '';
  });
  if (inputHud) {
    inputHud.addEventListener('change', () => {
      const files = [...inputHud.files].filter(f => f.name.toLowerCase().endsWith('.ifc'));
      if (files.length) loadFiles(files);
      inputHud.value = '';
    });
  }
}

async function loadFromURL() {
  const input = document.getElementById('url-input');
  const status = document.getElementById('url-status');
  let url = input.value.trim();
  if (!url) return;
  if (!url.startsWith('http')) url = 'http://' + url;

  // URL-encode spaces and special chars in path (but not the protocol/host)
  try {
    const u = new URL(url);
    // Re-encode path segments — fixes "TEST IFCer" → "TEST%20IFCer"
    u.pathname = u.pathname.split('/').map(seg => encodeURIComponent(decodeURIComponent(seg))).join('/');
    url = u.toString();
  } catch(e) { /* keep original url */ }

  const filename = decodeURIComponent(url.split('/').pop().split('?')[0]) || 'model.ifc';
  if (!filename.toLowerCase().endsWith('.ifc')) {
    status.style.color = '#f87171';
    status.textContent = 'URL måste peka på en .ifc-fil';
    return;
  }

  status.style.color = '#64748b';
  status.textContent = 'Hämtar ' + filename + '...';

  try {
    const res = await fetch(url, { mode: 'cors' });
    if (!res.ok) throw new Error(`HTTP ${res.status} — ${res.statusText}`);
    const buf = await res.arrayBuffer();
    status.textContent = '';
    await loadFileBuffer(buf, filename);
  } catch(e) {
    status.style.color = '#f87171';
    status.textContent = 'Fel: ' + e.message;
    console.error('URL load error:', e);
  }
}

async function loadFileBuffer(buf, filename) {
  // Warn for very large files
  const mb = buf.byteLength / (1024 * 1024);
  if (mb > 50) {
    const ok = confirm(
      `${filename} är ${mb.toFixed(0)} MB — stora filer tar lång tid.\n\nFortsätta ändå?`
    );
    if (!ok) return;
  }
  showLoading(`Laddar ${filename}...`, 5);
  try {
    await parseAndRender(buf, filename);
  } catch(e) {
    console.error('Parse error:', e);
    alert('Fel vid inläsning: ' + e.message);
  }
  hideLoading();
  document.getElementById('ui-overlay').classList.add('hidden');
  document.getElementById('stats-bar').classList.add('visible');
  document.getElementById('disc-panel').classList.add('floating');
  updateVRButton();
  frameCamera();
  updateStats();
}

async function loadFiles(files) {
  for (const file of files) {
    const buf = await file.arrayBuffer();
    await loadFileBuffer(buf, file.name);
  }
}

function updateVRButton() {
  const btn = document.getElementById('vr-btn');
  const msg = document.getElementById('no-vr-msg');
  if (!navigator.xr) {
    msg.style.display = 'inline';
    return;
  }
  navigator.xr.isSessionSupported('immersive-vr').then(ok => {
    if (ok) {
      btn.style.display = 'inline-block';
    } else {
      msg.style.display = 'inline';
    }
  });
}

// ── SCENE BOUNDING BOX ───────────────────────────────────────────────────────
// Three.js r128's Box3.setFromObject ignores InstancedMesh instance matrices —
// it only uses the geometry's local bounding box. This helper fixes that.
function computeSceneBox() {
  const box = new THREE.Box3();
  const tmpBox = new THREE.Box3();
  const tmpMat = new THREE.Matrix4();
  const tmpCombined = new THREE.Matrix4();
  ifcRoot.updateMatrixWorld(true);
  ifcRoot.traverse(child => {
    if (!child.geometry) return;
    if (child.isInstancedMesh) {
      if (!child.geometry.boundingBox) child.geometry.computeBoundingBox();
      const gbox = child.geometry.boundingBox;
      for (let i = 0; i < child.count; i++) {
        child.getMatrixAt(i, tmpMat);
        // full transform = ifcRoot.matrixWorld (rotation -PI/2) * instanceMat
        tmpCombined.multiplyMatrices(child.parent.matrixWorld, tmpMat);
        tmpBox.copy(gbox).applyMatrix4(tmpCombined);
        box.union(tmpBox);
      }
    } else {
      tmpBox.setFromObject(child);
      if (!tmpBox.isEmpty()) box.union(tmpBox);
    }
  });
  return box;
}

// ── CAMERA FRAME ─────────────────────────────────────────────────────────────
function frameCamera() {
  renderer.render(scene, camera); // ensure matrixWorld is current
  const box = computeSceneBox();
  if (box.isEmpty()) return;
  const center = new THREE.Vector3();
  box.getCenter(center);
  const size = new THREE.Vector3();
  box.getSize(size);
  const maxDim = Math.max(size.x, size.y, size.z);
  const dist = maxDim * 1.2;
  camera.position.set(center.x + dist * 0.7, center.y + dist * 0.5, center.z + dist * 0.7);
  camera.lookAt(center);
  // Sync orbit state
  orbitTarget.copy(center);
  orbitRadius = dist;
  orbitTheta = Math.PI / 4;
  orbitPhi = Math.PI / 3;
}

// ── DESKTOP ORBIT (mouse drag to rotate, wheel to zoom) ───────────────────
const orbitTarget = new THREE.Vector3();
let orbitActive = false, orbitLast = { x: 0, y: 0 };
let orbitPhi = Math.PI / 4, orbitTheta = Math.PI / 4, orbitRadius = 100;

function setupOrbit() {
  const canvas = renderer.domElement;
  canvas.addEventListener('mousedown', e => {
    if (e.button === 0) { orbitActive = true; orbitLast = { x: e.clientX, y: e.clientY }; }
  });
  window.addEventListener('mouseup', () => { orbitActive = false; });
  window.addEventListener('mousemove', e => {
    if (!orbitActive) return;
    const dx = (e.clientX - orbitLast.x) * 0.005;
    const dy = (e.clientY - orbitLast.y) * 0.005;
    orbitLast = { x: e.clientX, y: e.clientY };
    orbitTheta -= dx;
    orbitPhi = Math.max(0.05, Math.min(Math.PI - 0.05, orbitPhi + dy));
    updateOrbit();
  });
  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    orbitRadius *= (1 + e.deltaY * 0.001);
    orbitRadius = Math.max(0.5, orbitRadius);
    updateOrbit();
  }, { passive: false });
}

function updateOrbit() {
  if (xrSession) return; // don't override in VR
  const x = orbitTarget.x + orbitRadius * Math.sin(orbitPhi) * Math.sin(orbitTheta);
  const y = orbitTarget.y + orbitRadius * Math.cos(orbitPhi);
  const z = orbitTarget.z + orbitRadius * Math.sin(orbitPhi) * Math.cos(orbitTheta);
  camera.position.set(x, y, z);
  camera.lookAt(orbitTarget);
}

// ── TINY UTIL ─────────────────────────────────────────────────────────────────
function R(p) {
  const refs = [];
  const re = /#(\d+)/g;
  let m;
  while ((m = re.exec(p)) !== null) refs.push(+m[1]);
  return refs;
}

function getLocalMat(locPlacement, lpl, ap3d, pts, dirs) {
  if (locPlacement == null) return new THREE.Matrix4();
  const mat = new THREE.Matrix4();
  const stack = [];
  let cur = locPlacement;
  while (cur != null) {
    const lp = lpl[cur];
    if (!lp) break;
    stack.push(lp.ap ?? null);
    cur = lp.relTo ?? null;
  }
  for (let i = stack.length - 1; i >= 0; i--) {
    const apId = stack[i];
    if (apId == null) continue;
    const ap = ap3d[apId];
    if (!ap) continue;
    const loc = pts[ap.loc] || [0, 0, 0];
    const axisV = ap.axis != null ? dirs[ap.axis] : null;
    const refV = ap.ref != null ? dirs[ap.ref] : null;

    let Z = axisV ? new THREE.Vector3(...axisV).normalize() : new THREE.Vector3(0, 0, 1);
    let X = refV ? new THREE.Vector3(...refV).normalize() : new THREE.Vector3(1, 0, 0);
    let Y = new THREE.Vector3().crossVectors(Z, X).normalize();
    X = new THREE.Vector3().crossVectors(Y, Z).normalize();

    const local = new THREE.Matrix4().makeBasis(X, Y, Z);
    local.setPosition(loc[0], loc[1], loc[2]);
    mat.multiply(local);
  }
  return mat;
}

function parseCTOP(p) {
  const r = R(p);
  const nums = p.replace(/#\d+/g, '').match(/([-\d.eE+]+)/g) || [];
  // IFC4 CTOP3DNONUNIFORM: (Axis1, Axis2, LocalOrigin, Scale, Scale2, Scale3)
  const scale  = parseFloat(nums[0]) || 1;
  const scale2 = parseFloat(nums[1]) || scale;
  const scale3 = parseFloat(nums[2]) || scale;
  return { axisIds: r.slice(0, -1), originId: r[r.length - 1] || null, scale, scale2, scale3 };
}

function applyCTOP(mat, ctop, pts, dirs) {
  if (!ctop) return mat;
  const origin = ctop.originId != null ? pts[ctop.originId] : null;
  const ox = origin ? origin[0] : 0, oy = origin ? origin[1] : 0, oz = origin ? origin[2] : 0;
  const sc  = ctop.scale  || 1;
  const sc2 = ctop.scale2 || sc;
  const sc3 = ctop.scale3 || sc;
  const ax = ctop.axisIds || [];
  let X = ax[0] != null && dirs[ax[0]] ? new THREE.Vector3(...dirs[ax[0]]).normalize() : new THREE.Vector3(1, 0, 0);
  let Z = ax[1] != null && dirs[ax[1]] ? new THREE.Vector3(...dirs[ax[1]]).normalize() : new THREE.Vector3(0, 0, 1);
  let Y = new THREE.Vector3().crossVectors(Z, X).normalize();
  X = new THREE.Vector3().crossVectors(Y, Z).normalize();
  // v1.3.0: per-axis scale (NONUNIFORM: Scale→X, Scale2→Y, Scale3→Z)
  X.multiplyScalar(sc); Y.multiplyScalar(sc2); Z.multiplyScalar(sc3);
  const cm = new THREE.Matrix4().makeBasis(X, Y, Z);
  cm.setPosition(ox, oy, oz);
  return mat.clone().multiply(cm);
}
