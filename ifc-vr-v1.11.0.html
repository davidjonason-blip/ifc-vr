// ── CSG: Sutherland-Hodgman subtract (v1.9.0) ────────────────────────────────
// Builds a set of outward half-planes from a convex cutter mesh.
function buildCutterHalfPlanes(geo) {
  const pos = geo.attributes.position;
  const byAxis = new Map();
  for (let i = 0; i < pos.count; i += 3) {
    const a = new THREE.Vector3().fromBufferAttribute(pos, i);
    const b = new THREE.Vector3().fromBufferAttribute(pos, i + 1);
    const c = new THREE.Vector3().fromBufferAttribute(pos, i + 2);
    const n = new THREE.Vector3()
      .crossVectors(new THREE.Vector3().subVectors(b, a), new THREE.Vector3().subVectors(c, a));
    if (n.lengthSq() < 1e-16) continue;
    n.normalize();
    const flip = (Math.abs(n.x) >= Math.abs(n.y) && Math.abs(n.x) >= Math.abs(n.z))
      ? Math.sign(n.x) : (Math.abs(n.y) >= Math.abs(n.z) ? Math.sign(n.y) : Math.sign(n.z));
    const cn = n.clone().multiplyScalar(flip < 0 ? -1 : 1);
    const key = `${cn.x.toFixed(1)},${cn.y.toFixed(1)},${cn.z.toFixed(1)}`;
    const d = -n.dot(a);
    if (!byAxis.has(key)) byAxis.set(key, []);
    byAxis.get(key).push({ n: n.clone(), d });
  }
  const planes = [];
  for (const entries of byAxis.values()) {
    const avg_d = entries.reduce((s, e) => s + e.d, 0) / entries.length;
    planes.push({ n: entries[0].n.clone(), d: avg_d });
  }
  return planes;
}

// Sutherland-Hodgman: keep the part of poly OUTSIDE the half-plane (n·P+d ≥ 0)
function clipPolyKeepOutside(poly, n, d) {
  if (poly.length === 0) return [];
  const out = [];
  for (let i = 0; i < poly.length; i++) {
    const curr = poly[i];
    const next = poly[(i + 1) % poly.length];
    const dc = n.dot(curr) + d;
    const dn = n.dot(next) + d;
    if (dc >= -1e-7) out.push(curr.clone());
    if ((dc > 1e-7) !== (dn > 1e-7)) {
      const t = dc / (dc - dn);
      out.push(curr.clone().lerp(next, t));
    }
  }
  return out;
}

// Subtract cutterGeo from firstGeo; returns new BufferGeometry (or firstGeo unchanged on failure).
function csgSubtract(firstGeo, cutterGeo) {
  try {
    const planes = buildCutterHalfPlanes(cutterGeo);
    if (planes.length === 0) return firstGeo;
    const srcPos = firstGeo.attributes.position;
    const srcNrm = firstGeo.attributes.normal;
    if (!srcPos) return firstGeo;
    const outPos = [], outNrm = [];
    const EPS = 1e-5;
    function insideCutter(v) {
      for (const { n, d } of planes) if (n.dot(v) + d > EPS) return false;
      return true;
    }
    for (let i = 0; i < srcPos.count; i += 3) {
      const va = new THREE.Vector3().fromBufferAttribute(srcPos, i);
      const vb = new THREE.Vector3().fromBufferAttribute(srcPos, i + 1);
      const vc = new THREE.Vector3().fromBufferAttribute(srcPos, i + 2);
      const fn = srcNrm
        ? new THREE.Vector3().fromBufferAttribute(srcNrm, i).normalize()
        : new THREE.Vector3().crossVectors(
            new THREE.Vector3().subVectors(vb, va),
            new THREE.Vector3().subVectors(vc, va)).normalize();
      const ia = insideCutter(va), ib = insideCutter(vb), ic = insideCutter(vc);
      if (ia && ib && ic) continue; // fully inside cutter — remove
      if (!ia && !ib && !ic) {     // fully outside — keep
        outPos.push(va.x, va.y, va.z, vb.x, vb.y, vb.z, vc.x, vc.y, vc.z);
        outNrm.push(fn.x, fn.y, fn.z, fn.x, fn.y, fn.z, fn.x, fn.y, fn.z);
        continue;
      }
      // Partial — clip against each outward half-plane
      let poly = [va, vb, vc];
      for (const { n, d } of planes) {
        poly = clipPolyKeepOutside(poly, n, d);
        if (poly.length < 3) break;
      }
      for (let k = 1; k < poly.length - 1; k++) {
        const pa = poly[0], pb = poly[k], pc = poly[k + 1];
        const cn = new THREE.Vector3().crossVectors(
          new THREE.Vector3().subVectors(pb, pa),
          new THREE.Vector3().subVectors(pc, pa)).normalize();
        if (cn.lengthSq() < 1e-8) continue;
        outPos.push(pa.x, pa.y, pa.z, pb.x, pb.y, pb.z, pc.x, pc.y, pc.z);
        outNrm.push(cn.x, cn.y, cn.z, cn.x, cn.y, cn.z, cn.x, cn.y, cn.z);
      }
    }
    if (outPos.length < 9) return firstGeo;
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(outPos, 3));
    geo.setAttribute('normal',   new THREE.Float32BufferAttribute(outNrm, 3));
    return geo;
  } catch (e) {
    return firstGeo;
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// IFC PARSER — adapted from ifc-viewer-v2.7.1
// Geometry: extrudes, shells, facetedBrep, polygonal facesets, swept disk
// ═══════════════════════════════════════════════════════════════════════════
async function parseAndRender(data, filename) {
  const disc = detectDiscipline(filename);
  disciplineVisible[disc] = disciplineVisible[disc] ?? true;

  const text = new TextDecoder('utf-8').decode(data);
  let US = 0.001;
  if (text.includes('.MILLI.,.METRE.')) US = 0.001;
  else if (text.includes('.CENTI.,.METRE.')) US = 0.01;
  else US = 1.0;
  UNIT_SCALE = US;

  setProgress(5); setSub('Parsar STEP...');

  // Single-pass parse + extract (no em object — saves memory for large files)
  const pts = {}, dirs = {}, ap3d = {}, lpl = {}, loops = {}, fbnd = {}, faces = {},
    shells = {}, repMaps = {}, mapItems = {}, shReps = {}, shRepId = {}, pds = {}, ctops = {},
    extrudes = {}, profiles = {}, fbreps = {}, sweptDisks = {}, boolOps = {},
    cartPtLists3D = {}, indexedPolyFaces = {}, polyFaceSets = {}, triFaceSets = {},
    colours = {}, renderings = {}, surfStyles = {}, styleAssigns = {}, styledItems = [],
    relAssocMat = [], relDefByType = [], elementTypes = {},
    cartPtLists2D = {}, indexedPolyCurves = {}, polylines = {},
    shellModels = {}, // v1.7.0: IFCSHELLBASEDSURFACEMODEL wrapper → shell ref
    revolvedSolids = {}, // v1.10.0: IFCREVOLVEDAREASOLID → {profileId, posId, axis1Id, angle}
    ap2d = {}, // v1.10.0: IFCAXIS2PLACEMENT2D → {loc, ref}
    relVoids = []; // v1.9.0: IFCRELVOIDSELEMENT → [{elementId, openingId}]

  // For two-pass product resolution we need to store product params
  const productParams = {}; // id → raw param string (only for products)

  const PRODUCT_TYPES = new Set([
    'IFCWALL','IFCWALLSTANDARDCASE','IFCSLAB','IFCDOOR','IFCWINDOW',
    'IFCCOLUMN','IFCBEAM','IFCROOF','IFCSTAIR','IFCSTAIRFLIGHT','IFCFURNISHINGELEMENT',
    'IFCSPACE','IFCRAMP','IFCPLATE','IFCMEMBER','IFCCOVERING',
    'IFCFLOWSEGMENT','IFCFLOWFITTING','IFCDUCTSEGMENT','IFCDUCTFITTING',
    'IFCPIPESEGMENT','IFCPIPEFITTING','IFCBUILDINGSTOREY','IFCBUILDINGELEMENTPROXY',
    'IFCFLOWTERMINAL','IFCDISTRIBUTIONELEMENT','IFCSANITARYTERMINAL',
    'IFCCURTAINWALL','IFCRAILING','IFCLIGHTFIXTURE','IFCFOOTING',
    'IFCAIRTERMINAL','IFCFIRESUPPRESSIONTERMINAL','IFCVALVE','IFCPUMP','IFCTANK',
    'IFCFAN','IFCFLOWCONTROLLER','IFCENERGYCONVERSIONDEVICE','IFCFLOWMOVINGDEVICE',
    // v1.2.0: saknade ventilationstyper
    'IFCDAMPER','IFCDUCTSILENCER','IFCFLOWTREATMENTDEVICE','IFCFLOWSTORAGEDEVICE',
    'IFCHUMIDIFIER','IFCCOIL','IFCFILTER','IFCBURNER','IFCCOMPRESSOR','IFCCONDENSER',
    'IFCPILE','IFCCHIMNEY','IFCELECTRICAPPLIANCE','IFCMEDICALDEVICE',
    'IFCMECHANICALFASTENER','IFCDISCRETEACCESSORY','IFCFLOWINSTRUMENT',
    'IFCDISTRIBUTIONPORT','IFCDISTRIBUTIONSYSTEM',
    'IFCCABLECARRIERSEGMENT','IFCCABLECARRIERFITTING',
    'IFCOPENINGELEMENT' // v1.9.0: needed for CSG void subtraction
  ]);
  const products = {};

  // Parse line-by-line in chunks, extract directly (no intermediate em object)
  const textLen = text.length;
  const CHUNK_SIZE = 200_000; // characters per chunk
  let pos = 0, lineStart = 0, lineEnd = 0;
  let chunkCount = 0;

  // Simple line splitter that avoids building a massive array
  const RE_ENTITY = /^#(\d+)\s*=\s*([A-Z][A-Z0-9_]*)\s*\(([\s\S]*)\)\s*$/i;

  // We split on semicolons but need to handle multi-line entities
  // Strategy: remove comments, then split on \n, join continuation lines
  const cleanText = text.replace(/\/\*[\s\S]*?\*\//g, '');
  const rawLines = cleanText.split('\n');
  const totalLines = rawLines.length;
  let buf = '';
  const PARSE_CHUNK = 8000;

  for (let i = 0; i < totalLines; i++) {
    if (i % PARSE_CHUNK === 0 && i > 0) {
      setProgress(5 + 30 * (i / totalLines));
      await sleep(0);
    }
    const ln = rawLines[i].trim();
    if (!ln || ln === 'ENDSEC;' || ln === 'END-ISO-10303-21;') { buf = ''; continue; }
    buf += ' ' + ln;
    if (!ln.endsWith(';')) continue;
    // Complete statement — strip trailing semicolon and parse
    const stmt = buf.trim().slice(0, -1);
    buf = '';
    if (!stmt.startsWith('#')) continue;
    const m = stmt.match(/^#(\d+)\s*=\s*([A-Z][A-Z0-9_]*)\s*\(([\s\S]*)\)$/i);
    if (!m) continue;
    const id = +m[1], type = m[2].toUpperCase(), p = m[3];

    switch (type) {
      case 'IFCCARTESIANPOINT': {
        const m = p.match(/\(\s*([-\d.eE+]+)\s*,\s*([-\d.eE+]+)(?:\s*,\s*([-\d.eE+]+))?\s*\)/);
        if (m) pts[id] = [+m[1], +m[2], +(m[3] || 0)]; break;
      }
      case 'IFCDIRECTION': {
        const m = p.match(/\(\s*([-\d.eE+]+)\s*,\s*([-\d.eE+]+)(?:\s*,\s*([-\d.eE+]+))?\s*\)/);
        if (m) dirs[id] = [+m[1], +m[2], +(m[3] || 0)]; break;
      }
      case 'IFCAXIS2PLACEMENT3D': { const r = R(p); ap3d[id] = { loc: r[0] ?? null, axis: r[1] ?? null, ref: r[2] ?? null }; break; }
      case 'IFCLOCALPLACEMENT': {
        const r = R(p), raw = p.replace(/\s/g, '');
        if (raw.startsWith('$,')) lpl[id] = { relTo: null, ap: r[0] ?? null };
        else lpl[id] = { relTo: r[0] ?? null, ap: r[1] ?? null };
        break;
      }
      case 'IFCPOLYLINE': { polylines[id] = R(p); break; }
      case 'IFCPOLYLOOP': { loops[id] = R(p); break; }
      case 'IFCFACEOUTERBOUND': { const r = R(p); if (r[0] != null) fbnd[id] = { loopId: r[0], outer: true }; break; }
      case 'IFCFACEBOUND': { const r = R(p); if (r[0] != null) fbnd[id] = { loopId: r[0], outer: false }; break; }
      case 'IFCFACE': { faces[id] = R(p); break; }
      case 'IFCOPENSHELL': case 'IFCCLOSEDSHELL': case 'IFCCONNECTEDFACESET': { shells[id] = R(p); break; }
      case 'IFCSHELLBASEDSURFACEMODEL': { const r = R(p); if (r[0] != null) shellModels[id] = r[0]; break; } // v1.7.0
      case 'IFCREPRESENTATIONMAP': { const r = R(p); repMaps[id] = { apId: r[0] ?? null, repId: r[1] ?? null }; break; }
      case 'IFCMAPPEDITEM': { const r = R(p); mapItems[id] = { repMapId: r[0] ?? null, transformId: r[1] ?? null }; break; }
      case 'IFCSHAPEREPRESENTATION': {
        shReps[id] = R(p);
        const strs = p.match(/'([^']*)'/g);
        shRepId[id] = strs && strs[0] ? strs[0].slice(1, -1) : null;
        break;
      }
      case 'IFCPRODUCTDEFINITIONSHAPE': { pds[id] = R(p); break; }
      case 'IFCCARTESIANTRANSFORMATIONOPERATOR3D':
      case 'IFCCARTESIANTRANSFORMATIONOPERATOR3DNONUNIFORM':
      case 'IFCCARTESIANTRANSFORMATIONOPERATOR': { ctops[id] = parseCTOP(p); break; }
      case 'IFCFACETEDBREP': { const r = R(p); if (r[0] != null) fbreps[id] = r[0]; break; }
      case 'IFCEXTRUDEDAREASOLID': {
        const r = R(p);
        const depthMatch = p.match(/,\s*([\d.eE+\-]+)\s*$/);
        extrudes[id] = { profileId: r[0] ?? null, posId: r[1] ?? null, dirId: r[2] ?? null, depth: depthMatch ? +depthMatch[1] : 1.0 };
        break;
      }
      case 'IFCARBITRARYCLOSEDPROFILEDEF': { const r = R(p); profiles[id] = { type: 'closed', curveId: r[0] ?? null }; break; }
      case 'IFCARBITRARYPROFILEDEFWITHVOIDS': { const r = R(p); profiles[id] = { type: 'closedWithVoids', outerCurveId: r[0] ?? null, innerCurveIds: r.slice(1) }; break; }
      case 'IFCRECTANGLEPROFILEDEF': {
        const nums = p.match(/([\d.eE+\-]+)/g) || [];
        const r = R(p);
        profiles[id] = { type: 'rectangle', posId: r[r.length - 1] ?? null, xDim: parseFloat(nums[nums.length - 2]) || 1, yDim: parseFloat(nums[nums.length - 1]) || 1 };
        break;
      }
      case 'IFCCIRCLEPROFILEDEF': {
        const r = R(p); const nums = p.match(/([\d.eE+\-]+)/g) || [];
        profiles[id] = { type: 'circle', posId: r[r.length - 1] ?? null, radius: parseFloat(nums[nums.length - 1]) || 0.5 };
        break;
      }
      case 'IFCCIRCLEHOLLOWPROFILEDEF': {
        const r = R(p); const nums = p.match(/([\d.eE+\-]+)/g) || [];
        profiles[id] = { type: 'circle', posId: r[r.length - 1] ?? null, radius: parseFloat(nums[nums.length - 2]) || 0.1 };
        break;
      }
      case 'IFCISHAPEPROFILEDEF': {
        const r = R(p); const nums = p.match(/([\d.eE+\-]+)/g) || [];
        const n = nums.length;
        profiles[id] = { type: 'ishape', posId: r.length > 0 ? r[r.length-1] : null,
          ow: parseFloat(nums[n-4])||0.1, od: parseFloat(nums[n-3])||0.2,
          wt: parseFloat(nums[n-2])||0.01, ft: parseFloat(nums[n-1])||0.01 };
        break;
      }
      case 'IFCAXIS2PLACEMENT2D': { const r = R(p); ap2d[id] = { loc: r[0] ?? null, ref: r[1] ?? null }; break; }
      case 'IFCREVOLVEDAREASOLID': {
        const r = R(p);
        const pNoRefs = p.replace(/#\d+/g, '');
        const nums = pNoRefs.match(/[+-]?(?:\d+\.\d*|\.\d+|\d+)(?:[eE][+-]?\d+)?/g) || [];
        const angle = parseFloat(nums[nums.length - 1]) || (Math.PI * 2);
        if (r[0] != null) revolvedSolids[id] = { profileId: r[0], posId: r[1] ?? null, axis1Id: r[2] ?? null, angle };
        break;
      }
      case 'IFCSWEPTDISKSOLID': {
        const r = R(p);
        const pNoRefs = p.replace(/#\d+/g, '');
        const nums = pNoRefs.match(/[+-]?(?:\d+\.\d*|\.\d+|\d+)(?:[eE][+-]?\d+)?/g) || [];
        if (r[0] != null) sweptDisks[id] = { directrixId: r[0], radius: parseFloat(nums[0]) || 0.05 };
        break;
      }
      case 'IFCCARTESIANPOINTLIST2D': {
        // ((pt1),(pt2),...) — extract all number pairs
        const nums = p.match(/([-\d.eE+]+)/g) || [];
        const arr = [];
        for (let i = 0; i + 1 < nums.length; i += 2) arr.push([+nums[i], +nums[i+1]]);
        cartPtLists2D[id] = arr;
        break;
      }
      case 'IFCINDEXEDPOLYCURVE': {
        // (PointList, Segments, SelfIntersect) — first ref = point list
        const r = R(p);
        indexedPolyCurves[id] = { listId: r[0] ?? null };
        break;
      }
      // Color chain
      case 'IFCCOLOURRGB': {
        const nums = p.match(/([\d.eE+\-]+)/g) || [];
        colours[id] = [parseFloat(nums[nums.length-3])||0, parseFloat(nums[nums.length-2])||0, parseFloat(nums[nums.length-1])||0];
        break;
      }
      case 'IFCSURFACESTYLERENDERING': {
        const r = R(p); const m = p.match(/#\d+\s*,\s*([\d.eE+\-]+)/);
        renderings[id] = { colourId: r[0] ?? null, transparency: m ? parseFloat(m[1]) : 0 };
        break;
      }
      case 'IFCSURFACESTYLE': { surfStyles[id] = R(p); break; }
      case 'IFCPRESENTATIONSTYLEASSIGNMENT': { styleAssigns[id] = R(p); break; }
      case 'IFCSTYLEDITEM': {
        const r = R(p); const hasItem = p.trimStart().startsWith('#');
        const itemId = hasItem ? r[0] : null; const styleRefs = hasItem ? r.slice(1) : r;
        for (const sid of styleRefs) styledItems.push({ itemId, assignId: sid });
        break;
      }
      case 'IFCRELASSOCIATESMATERIAL': {
        const r = R(p); if (r.length >= 2) relAssocMat.push({ productIds: r.slice(1, -1), materialId: r[r.length-1] });
        break;
      }
      case 'IFCRELDEFINESBYTYPE': {
        const r = R(p); if (r.length >= 2) relDefByType.push({ productIds: r.slice(1, -1), typeId: r[r.length-1] });
        break;
      }
      case 'IFCBOUNDINGBOX': {
        // Corner point + X/Y/Z dims: IFCBOUNDINGBOX(#corner, xDim, yDim, zDim)
        const r = R(p); const nums = p.match(/([\d.eE+\-]+)/g) || [];
        if (r[0] != null && nums.length >= 3) {
          const xd = +nums[nums.length-3], yd = +nums[nums.length-2], zd = +nums[nums.length-1];
          boolOps[id] = { type: 'bbox', cornerId: r[0], xd, yd, zd }; // reuse boolOps as scratch
        }
        break;
      }
      // v1.9.0: void element relationships for CSG
      case 'IFCRELVOIDSELEMENT': {
        // (GUID, OwnerHistory, Name, Description, RelatingBuildingElement, RelatedOpeningElement)
        const r = R(p);
        // r[0]=OwnerHistory(ref), r[1]=BuildingElement(ref), r[2]=OpeningElement(ref)
        if (r.length >= 3) relVoids.push({ elementId: r[1], openingId: r[2] });
        break;
      }

      // IFC4 polygon face sets
      case 'IFCCARTESIANPOINTLIST3D': {
        const nums = p.match(/([-\d.eE+]+)/g) || [];
        const arr = [];
        for (let i = 0; i + 2 < nums.length; i += 3) arr.push([+nums[i], +nums[i+1], +nums[i+2]]);
        cartPtLists3D[id] = arr; break;
      }
      case 'IFCINDEXEDPOLYGONALFACE': {
        const nums = p.match(/\d+/g) || [];
        indexedPolyFaces[id] = nums.map(Number); break;
      }
      case 'IFCPOLYGONALFACESET': {
        const r = R(p);
        polyFaceSets[id] = { listId: r[0] ?? null, faceIds: r.slice(1) }; break;
      }
      case 'IFCTRIANGULATEDFACESET': {
        const r = R(p);
        const allNums = p.match(/\d+/g) || [];
        const tris = [];
        for (let i = 3; i + 2 < allNums.length; i += 3)
          tris.push([+allNums[i], +allNums[i+1], +allNums[i+2]]);
        triFaceSets[id] = { listId: r[0] ?? null, triangles: tris }; break;
      }

      default:
        if (PRODUCT_TYPES.has(type)) {
          const nameM = p.match(/'([^']*)'/);
          products[id] = {
            id, type,
            name: nameM ? nameM[1] : '',
            lpId: null,   // resolved below after all entities parsed
            pdsId: null   // resolved below
          };
          // Store raw params for two-pass resolution
          productParams[id] = p;
        }
    }
  }

  // ── Two-pass: resolve lpId + pdsId using stored productParams ──
  for (const [idStr, prod] of Object.entries(products)) {
    const r = R(productParams[+idStr] || '');
    prod.lpId  = r.find(x => lpl[x]  !== undefined) ?? null;
    prod.pdsId = r.find(x => pds[x]  !== undefined) ?? null;
  }

  setProgress(40); setSub('Bygger färgkarta...');
  await sleep(0);

  // ── Color resolution ──────────────────────────────────────────────────────
  const itemColor = {}, productColor = {};

  // surfStyle → rendering → colour
  const ssToRgba = {};
  for (const [sid, refs] of Object.entries(surfStyles)) {
    for (const ref of refs) {
      const rnd = renderings[ref];
      if (rnd) {
        const col = colours[rnd.colourId];
        if (col) ssToRgba[sid] = { r: col[0], g: col[1], b: col[2], a: 1 - rnd.transparency };
      }
    }
  }

  // styledItems → itemColor
  for (const si of styledItems) {
    let rgba = null;
    const assign = styleAssigns[si.assignId];
    if (assign) {
      for (const ref of assign) {
        const ss = ssToRgba[ref];
        if (ss) { rgba = ss; break; }
      }
    } else {
      rgba = ssToRgba[si.assignId];
    }
    if (rgba && si.itemId != null) itemColor[si.itemId] = rgba;
  }

  // product → shape → representation items → itemColor
  const shapeToProduct = {};
  for (const [pid, prod] of Object.entries(products)) {
    if (prod.shapeId != null) shapeToProduct[prod.shapeId] = +pid;
  }

  setProgress(50); setSub('Budgeterar mesh...');
  await sleep(0);

  // v1.1.0: Ta bort hård filstorleksgräns — ladda alla produkter upp till 20 000 mesh.
  // Quest 3 klarar ~15–20k Lambert-mesh utan problem för normala byggprojekt.
  const MESH_BUDGET = 20000;
  const LARGE_FILE = false; // Tillåt alltid full geometri (inga BoundingBox-fallbacks)
  let meshCount = 0;

  const fileObj = {
    id: nextFileId++, name: filename, discipline: disc, meshes: [], visible: true
  };
  loadedFiles.push(fileObj);

  setProgress(55); setSub('Bygger 3D-geometri...');
  await sleep(15);

  // ── Build meshes for each product ─────────────────────────────────────────
  const instanceBuckets = new Map(); // bucketKey → {repMapId,apId,repId,rgba,disc,type,instances[]}
  const rmGeoCache = new Map();      // repMapId → canonical BufferGeometry (identity transform)
  const INSTANCE_MIN = 2;
  let built = 0;
  const productList = Object.values(products);

  for (let pi = 0; pi < productList.length; pi++) {
    if (pi % 200 === 0) {
      setProgress(55 + 40 * (pi / productList.length));
      await sleep(0);
    }
    if (meshCount >= MESH_BUDGET) break; // Budget limit

    const prod = productList[pi];
    if (!prod.pdsId) continue;

    // Skip IFCSPACE in VR by default (too many, clutters view)
    if (prod.type === 'IFCSPACE') continue;

    // Get world matrix
    const worldMat = getLocalMat(prod.lpId, lpl, ap3d, pts, dirs);

    // Get product color — try itemColor on the rep items first, then productColor
    let rgba = productColor[prod.id] || null;

    // Resolve shape → representations
    const shape = pds[prod.pdsId];
    if (!shape) continue;

    // Traverse shape representations
    const repIds = shape;
    for (const repId of repIds) {
      const repIdStr = shRepId[repId];
      // Only 'Body' or null/empty representations
      // v1.2.0: MappedRepresentation + Tessellation (V057 ventilation)
      // v1.7.0: SurfaceModel tillagd (V157: IFCSHELLBASEDSURFACEMODEL)
      if (repIdStr && !['Body', 'Facetation', 'SolidModel', 'Brep', 'CSG', 'Clipping',
          'SweptSolid', 'AdvancedSweptSolid', 'BoundingBox',
          'MappedRepresentation', 'Tessellation', 'SurfaceModel'].includes(repIdStr)) continue;

      const repItems = shReps[repId] || [];

      // Try to find color from itemColor (IFCSTYLEDITEM → IFCSURFACESTYLE chain)
      if (!rgba) {
        for (const itemId of repItems) {
          if (itemColor[itemId]) { rgba = itemColor[itemId]; break; }
        }
      }

      // Instancing: collect all-IFCMAPPEDITEM reps into buckets for the build pass below
      if (repItems.length > 0 && repItems.every(id => mapItems[id])) {
        for (const itemId of repItems) {
          const mi = mapItems[itemId];
          if (!mi) continue;
          const rm = repMaps[mi.repMapId];
          if (!rm) continue;
          const colorKey = rgba
            ? `${Math.round(rgba.r*255)},${Math.round(rgba.g*255)},${Math.round(rgba.b*255)},${rgba.a.toFixed(2)}`
            : (TYPE_COLORS[prod.type] || DISCIPLINES[disc]?.color || '#94a3b8');
          const bucketKey = `${mi.repMapId}|${colorKey}`;
          if (!instanceBuckets.has(bucketKey)) {
            instanceBuckets.set(bucketKey, { repMapId: mi.repMapId, apId: rm.apId, repId: rm.repId,
              rgba, disc, type: prod.type, instances: [] });
          }
          instanceBuckets.get(bucketKey).instances.push({ worldMat, transformId: mi.transformId });
        }
        break; // done with this product — skip buildGeometryFromItems
      }

      // Large files: skip heavy FacetedBrep/PolygonalFaceSet geometry — use BoundingBox rep instead
      let geoBuf;
      if (LARGE_FILE && repIdStr !== 'BoundingBox') {
        // Check if rep items are all heavy types — if so, prefer BoundingBox rep
        const allHeavy = repItems.every(id => fbreps[id] || polyFaceSets[id] || triFaceSets[id] || shells[id] || shellModels[id]);
        if (allHeavy) {
          geoBuf = null; // will try BoundingBox rep in next iteration
          continue;
        }
      }

      geoBuf = buildGeometryFromItems(
        repItems, worldMat, rgba, prod,
        { pts, dirs, ap3d, lpl, loops, fbnd, faces, shells, repMaps, mapItems,
          shReps, ctops, extrudes, profiles, fbreps, sweptDisks,
          cartPtLists3D, indexedPolyFaces, polyFaceSets, triFaceSets,
          cartPtLists2D, indexedPolyCurves, polylines,
          itemColor, boolOps, shellModels, revolvedSolids, ap2d }
      );

      if (geoBuf && geoBuf.attributes.position?.count > 0) {
        const col = rgba
          ? new THREE.Color(rgba.r, rgba.g, rgba.b)
          : new THREE.Color(TYPE_COLORS[prod.type] || DISCIPLINES[disc]?.color || '#94a3b8');

        // Quest 3: use MeshLambertMaterial (cheaper than Standard/Phong)
        const mat = new THREE.MeshLambertMaterial({
          color: col,
          transparent: rgba && rgba.a < 0.99,
          opacity: rgba ? rgba.a : 1,
          side: THREE.DoubleSide
        });

        const mesh = new THREE.Mesh(geoBuf, mat);
        mesh.userData = {
          type: prod.type,
          name: prod.name,
          discipline: disc,
          fileId: fileObj.id,
          prodId: prod.id
        };
        mesh.visible = disciplineVisible[disc] !== false;
        ifcRoot.add(mesh);
        const key = `f${fileObj.id}_p${prod.id}`;
        meshMap[key] = mesh;
        fileObj.meshes.push(mesh);
        meshCount++;
        built++;

        // Expand model box
        geoBuf.computeBoundingBox();
        if (geoBuf.boundingBox) {
          const b = geoBuf.boundingBox.clone().applyMatrix4(mesh.matrixWorld).applyMatrix4(ifcRoot.matrixWorld);
          modelBox.union(b);
        }
        break; // one mesh per product
      }
    }
  }

  // ── InstancedMesh build pass ──────────────────────────────────────────────
  const US_INST = UNIT_SCALE;
  for (const [, bucket] of instanceBuckets) {
    const { repMapId, apId, repId, rgba: bRgba, disc: bDisc, type: bType, instances } = bucket;
    if (instances.length === 0 || meshCount >= MESH_BUDGET) continue;

    // Build or reuse canonical geometry at identity transform
    let canonGeo = rmGeoCache.get(repMapId);
    if (!canonGeo) {
      const subItems = shReps[repId] || [];
      canonGeo = buildGeometryFromItems(
        subItems, new THREE.Matrix4(), bRgba, { type: bType, name: '' },
        { pts, dirs, ap3d, lpl, loops, fbnd, faces, shells, repMaps, mapItems,
          shReps, ctops, extrudes, profiles, fbreps, sweptDisks,
          cartPtLists3D, indexedPolyFaces, polyFaceSets, triFaceSets,
          cartPtLists2D, indexedPolyCurves, polylines,
          itemColor, boolOps, shellModels, revolvedSolids, ap2d }
      );
      if (canonGeo) rmGeoCache.set(repMapId, canonGeo);
    }
    if (!canonGeo || !canonGeo.attributes.position || canonGeo.attributes.position.count === 0) continue;

    const col = bRgba
      ? new THREE.Color(bRgba.r, bRgba.g, bRgba.b)
      : new THREE.Color(TYPE_COLORS[bType] || DISCIPLINES[bDisc]?.color || '#94a3b8');
    const bMat = new THREE.MeshLambertMaterial({
      color: col,
      transparent: bRgba && bRgba.a < 0.99,
      opacity: bRgba ? bRgba.a : 1,
      side: THREE.DoubleSide
    });

    // apMat is the same for all instances (tied to the RepresentationMap)
    const apMat = apId != null ? buildAP3DMatrix(ap3d[apId], pts, dirs) : new THREE.Matrix4();

    if (instances.length >= INSTANCE_MIN) {
      const im = new THREE.InstancedMesh(canonGeo, bMat, instances.length);
      im.userData = { type: bType, name: bType, discipline: bDisc, fileId: fileObj.id, isInstanced: true };
      im.visible = disciplineVisible[bDisc] !== false;
      for (let i = 0; i < instances.length; i++) {
        const inst = instances[i];
        let instMat = inst.worldMat.clone().multiply(apMat);
        if (inst.transformId != null && ctops[inst.transformId]) {
          instMat = applyCTOP(instMat, ctops[inst.transformId], pts, dirs);
        }
        // Convert translation from IFC mm to Three.js metres
        instMat.elements[12] *= US_INST;
        instMat.elements[13] *= US_INST;
        instMat.elements[14] *= US_INST;
        im.setMatrixAt(i, instMat);
      }
      im.instanceMatrix.needsUpdate = true;
      ifcRoot.add(im);
      fileObj.meshes.push(im);
      meshCount += instances.length;
      built += instances.length;
    } else {
      // Singleton: fall back to regular Mesh with full transform baked in
      for (const inst of instances) {
        let singleMat = inst.worldMat.clone().multiply(apMat);
        if (inst.transformId != null && ctops[inst.transformId]) {
          singleMat = applyCTOP(singleMat, ctops[inst.transformId], pts, dirs);
        }
        const subItems = shReps[repId] || [];
        const geoBuf = buildGeometryFromItems(
          subItems, singleMat, bRgba, { type: bType, name: '' },
          { pts, dirs, ap3d, lpl, loops, fbnd, faces, shells, repMaps, mapItems,
            shReps, ctops, extrudes, profiles, fbreps, sweptDisks,
            cartPtLists3D, indexedPolyFaces, polyFaceSets, triFaceSets,
            cartPtLists2D, indexedPolyCurves, polylines,
            itemColor, boolOps, shellModels, revolvedSolids, ap2d }
        );
        if (!geoBuf || !geoBuf.attributes.position || geoBuf.attributes.position.count === 0) continue;
        const mesh = new THREE.Mesh(geoBuf, bMat.clone());
        mesh.userData = { type: bType, name: '', discipline: bDisc, fileId: fileObj.id };
        mesh.visible = disciplineVisible[bDisc] !== false;
        ifcRoot.add(mesh);
        fileObj.meshes.push(mesh);
        meshCount++;
        built++;
      }
    }
  }

  // ── CSG subtraction pass (v1.9.0) ─────────────────────────────────────────
  if (relVoids.length > 0) {
    setProgress(97); setSub('Håltagningar...');
    await sleep(0);

    // Build lookup: productId → [mesh, ...]  (only regular Mesh, not InstancedMesh)
    const prodMeshes = {};
    for (const m of fileObj.meshes) {
      if (!m.isInstancedMesh && m.userData?.prodId != null) {
        const pid = m.userData.prodId;
        (prodMeshes[pid] = prodMeshes[pid] || []).push(m);
      }
    }

    const csgTarget = new Set([
      'IFCWALL','IFCWALLSTANDARDCASE','IFCSLAB','IFCROOF','IFCPLATE','IFCCOLUMN','IFCBEAM'
    ]);

    // Build opening geometry in opening-local IFC space (positions already in meters via US)
    function buildOpeningGeo(openingProdId) {
      const prod = products[openingProdId];
      if (!prod || prod.pdsId == null) return null;
      for (const srId of (pds[prod.pdsId] || [])) {
        const rid = shRepId[srId];
        if (rid && rid !== 'Body' && rid !== 'Facetation' && rid !== 'SolidModel') continue;
        const repItems = shReps[srId] || [];
        if (repItems.length === 0) continue;
        const geo = buildGeometryFromItems(
          repItems, new THREE.Matrix4(), null, { type: prod.type, name: '' },
          { pts, dirs, ap3d, lpl, loops, fbnd, faces, shells, repMaps, mapItems,
            shReps, ctops, extrudes, profiles, fbreps, sweptDisks,
            cartPtLists3D, indexedPolyFaces, polyFaceSets, triFaceSets,
            cartPtLists2D, indexedPolyCurves, polylines,
            itemColor, boolOps, shellModels, revolvedSolids, ap2d }
        );
        if (geo && geo.attributes.position?.count > 0) return geo;
      }
      return null;
    }

    for (const rv of relVoids) {
      const { elementId, openingId } = rv;
      const elemProd = products[elementId];
      if (!elemProd || !csgTarget.has(elemProd.type)) continue;
      const meshes = prodMeshes[elementId];
      if (!meshes || meshes.length === 0) continue;

      // Build cutter in opening-local space (meters), then transform to IFC world space
      const cutterLocalGeo = buildOpeningGeo(openingId);
      if (!cutterLocalGeo) continue;

      const openingProd = products[openingId];
      const openingWorldMat = getLocalMat(openingProd?.lpId ?? null, lpl, ap3d, pts, dirs);
      // Translate from IFC mm to meters (rotation/scale parts are dimensionless)
      openingWorldMat.elements[12] *= US;
      openingWorldMat.elements[13] *= US;
      openingWorldMat.elements[14] *= US;

      const cutterWorldGeo = cutterLocalGeo.clone();
      cutterWorldGeo.applyMatrix4(openingWorldMat);
      cutterWorldGeo.computeBoundingBox();
      const cutterBB = cutterWorldGeo.boundingBox.clone().expandByScalar(0.05);

      for (const mesh of meshes) {
        if (!mesh.geometry.boundingBox) mesh.geometry.computeBoundingBox();
        if (!mesh.geometry.boundingBox.intersectsBox(cutterBB)) continue;
        const result = csgSubtract(mesh.geometry, cutterWorldGeo);
        if (result !== mesh.geometry) {
          mesh.geometry.dispose();
          mesh.geometry = result;
          mesh.geometry.computeBoundingBox();
        }
      }
    }
  }

  setProgress(98); setSub(`Byggde ${built} mesh`);
  await sleep(50);

  updateDisciplinePanelUI();
}

// ── GEOMETRY BUILDER ──────────────────────────────────────────────────────────
function buildGeometryFromItems(itemIds, worldMat, rgba, prod, maps) {
  const { pts, dirs, ap3d, lpl, loops, fbnd, faces, shells, repMaps, mapItems,
    shReps, ctops, extrudes, profiles, fbreps, sweptDisks,
    cartPtLists3D, indexedPolyFaces, polyFaceSets, triFaceSets,
    cartPtLists2D, indexedPolyCurves, polylines,
    itemColor, boolOps, shellModels, revolvedSolids, ap2d } = maps;

  const US = UNIT_SCALE;
  const allPos = [], allIdx = [];
  let vertOffset = 0;

  function addTriangle(ax, ay, az, bx, by, bz, cx, cy, cz) {
    const b = vertOffset;
    allPos.push(ax, ay, az, bx, by, bz, cx, cy, cz);
    allIdx.push(b, b + 1, b + 2);
    vertOffset += 3;
  }

  function addFace(verts) { // verts = [[x,y,z],...] in world space (IFC Z-up units)
    if (verts.length < 3) return;
    for (let i = 1; i < verts.length - 1; i++) {
      addTriangle(
        verts[0][0] * US, verts[0][1] * US, verts[0][2] * US,
        verts[i][0] * US, verts[i][1] * US, verts[i][2] * US,
        verts[i+1][0] * US, verts[i+1][1] * US, verts[i+1][2] * US
      );
    }
  }

  function applyMatrix4ToVert(mat, x, y, z) {
    const e = mat.elements;
    return [
      e[0]*x + e[4]*y + e[8]*z  + e[12],
      e[1]*x + e[5]*y + e[9]*z  + e[13],
      e[2]*x + e[6]*y + e[10]*z + e[14]
    ];
  }

  function processShell(shellId, mat) {
    const faceIds = shells[shellId];
    if (!faceIds) return;
    for (const faceId of faceIds) {
      const boundIds = faces[faceId];
      if (!boundIds) continue;
      for (const boundId of boundIds) {
        const bnd = fbnd[boundId];
        if (!bnd) continue;
        const loopPtIds = loops[bnd.loopId];
        if (!loopPtIds) continue;
        const verts = loopPtIds.map(ptId => {
          const p = pts[ptId] || [0, 0, 0];
          return applyMatrix4ToVert(mat, p[0], p[1], p[2]);
        });
        if (!bnd.outer) continue; // skip inner (holes) — POC
        addFace(verts);
      }
    }
  }

  function processExtrude(extrudeId, mat) {
    const ext = extrudes[extrudeId];
    if (!ext) return;
    // Build local placement matrix for the solid (position within product space)
    const localMat = ext.posId != null ? buildAP3DMatrix(ap3d[ext.posId], pts, dirs) : new THREE.Matrix4();
    // combined = world * local  (all still in IFC native units, Z-up mm)
    const combined = mat.clone().multiply(localMat);

    const extDir = ext.dirId != null ? (dirs[ext.dirId] || [0, 0, 1]) : [0, 0, 1];

    const profilePts = resolveProfile(ext.profileId, profiles, pts, dirs, ap3d, cartPtLists2D, indexedPolyCurves, polylines);
    if (!profilePts || profilePts.length < 3) return;

    // Profile pts are in 2D (X,Y) profile-local space.
    // Transform each to world IFC-space via combined, then addFace applies * US.
    const bot = profilePts.map(([x, y]) => applyMatrix4ToVert(combined, x, y, 0));

    // Extrusion offset vector in world IFC-space
    const o0  = applyMatrix4ToVert(combined, 0, 0, 0);
    const oD  = applyMatrix4ToVert(combined, extDir[0]*ext.depth, extDir[1]*ext.depth, extDir[2]*ext.depth);
    const ex = oD[0]-o0[0], ey = oD[1]-o0[1], ez = oD[2]-o0[2];

    const top = bot.map(([x, y, z]) => [x+ex, y+ey, z+ez]);

    // Bottom cap (reversed winding for correct normal)
    for (let i = 1; i < bot.length - 1; i++) {
      addFace([bot[0], bot[i+1], bot[i]]);
    }
    // Top cap
    for (let i = 1; i < top.length - 1; i++) {
      addFace([top[0], top[i], top[i+1]]);
    }
    // Side quads
    for (let i = 0; i < bot.length; i++) {
      const j = (i + 1) % bot.length;
      addFace([bot[i], bot[j], top[j], top[i]]);
    }
  }

  function processSweptDisk(sdId, mat) {
    const sd = sweptDisks[sdId];
    if (!sd) return;
    const radius = sd.radius * US;
    const SEGS = 16; // v1.1.0: Höjt från 6 → 16 för runda rör
    const directrixPts = resolveDirectrix(sd.directrixId, pts, loops);
    if (!directrixPts || directrixPts.length < 2) return;

    for (let i = 0; i < directrixPts.length - 1; i++) {
      const p0 = directrixPts[i], p1 = directrixPts[i + 1];
      const [ax, ay, az] = applyMatrix4ToVert(mat, p0[0], p0[1], p0[2]);
      const [bx, by, bz] = applyMatrix4ToVert(mat, p1[0], p1[1], p1[2]);
      const A = new THREE.Vector3(ax*US, ay*US, az*US);
      const B = new THREE.Vector3(bx*US, by*US, bz*US);
      const fwd = B.clone().sub(A).normalize();
      let up = new THREE.Vector3(0, 1, 0);
      if (Math.abs(fwd.dot(up)) > 0.99) up.set(1, 0, 0);
      const right = new THREE.Vector3().crossVectors(fwd, up).normalize();
      const realUp = new THREE.Vector3().crossVectors(right, fwd).normalize();

      const circA = [], circB = [];
      for (let s = 0; s < SEGS; s++) {
        const ang = (s / SEGS) * Math.PI * 2;
        const cos = Math.cos(ang), sin = Math.sin(ang);
        circA.push([
          A.x + right.x * cos * radius + realUp.x * sin * radius,
          A.y + right.y * cos * radius + realUp.y * sin * radius,
          A.z + right.z * cos * radius + realUp.z * sin * radius
        ]);
        circB.push([
          B.x + right.x * cos * radius + realUp.x * sin * radius,
          B.y + right.y * cos * radius + realUp.y * sin * radius,
          B.z + right.z * cos * radius + realUp.z * sin * radius
        ]);
      }
      for (let s = 0; s < SEGS; s++) {
        const ns = (s + 1) % SEGS;
        addTriangle(circA[s][0],circA[s][1],circA[s][2], circB[s][0],circB[s][1],circB[s][2], circB[ns][0],circB[ns][1],circB[ns][2]);
        addTriangle(circA[s][0],circA[s][1],circA[s][2], circB[ns][0],circB[ns][1],circB[ns][2], circA[ns][0],circA[ns][1],circA[ns][2]);
      }
    }
  }

  function processPolyFaceSet(pfsId, mat) {
    const pfs = polyFaceSets[pfsId];
    if (!pfs) return;
    const ptList = cartPtLists3D[pfs.listId];
    if (!ptList) return;
    for (const faceId of pfs.faceIds) {
      const face = indexedPolyFaces[faceId];
      if (!face || face.length < 3) continue;
      const verts = face.map(idx => {
        const p = ptList[idx - 1] || [0, 0, 0];
        return applyMatrix4ToVert(mat, p[0], p[1], p[2]);
      });
      addFace(verts);
    }
  }

  function processTriFaceSet(tfsId, mat) {
    const tfs = triFaceSets[tfsId];
    if (!tfs) return;
    const ptList = cartPtLists3D[tfs.listId];
    if (!ptList) return;
    for (const tri of tfs.triangles) {
      const a = ptList[tri[0]-1]||[0,0,0], b = ptList[tri[1]-1]||[0,0,0], c = ptList[tri[2]-1]||[0,0,0];
      const wa = applyMatrix4ToVert(mat, a[0], a[1], a[2]);
      const wb = applyMatrix4ToVert(mat, b[0], b[1], b[2]);
      const wc = applyMatrix4ToVert(mat, c[0], c[1], c[2]);
      addTriangle(wa[0]*US,wa[1]*US,wa[2]*US, wb[0]*US,wb[1]*US,wb[2]*US, wc[0]*US,wc[1]*US,wc[2]*US);
    }
  }

  function processRevolved(revId, mat) {
    const rev = revolvedSolids[revId];
    if (!rev) return;
    const prof = profiles[rev.profileId];
    if (!prof) return;

    let profile2d;
    if (prof.type === 'circle') {
      // Apply 2D placement center (IFCAXIS2PLACEMENT2D → loc in IFC mm)
      let cx = 0, cy = 0;
      if (prof.posId != null && ap2d[prof.posId]) {
        const loc2d = pts[ap2d[prof.posId].loc];
        if (loc2d) { cx = loc2d[0]; cy = loc2d[1]; }
      }
      const r = prof.radius;
      profile2d = Array.from({ length: 16 }, (_, i) => {
        const a = (i / 16) * Math.PI * 2;
        return [cx + r * Math.cos(a), cy + r * Math.sin(a)];
      });
    } else {
      profile2d = resolveProfile(rev.profileId, profiles, pts, dirs, ap3d,
        cartPtLists2D, indexedPolyCurves, polylines);
    }
    if (!profile2d || profile2d.length < 2) return;

    // Build lathe points (x = radius from Y-axis, must be ≥ 0)
    const lathePoints = [];
    for (let i = 0; i < profile2d.length; i++) {
      const [x, y] = profile2d[i];
      if (x < -1e-6) continue;
      if (i === profile2d.length - 1) {
        const [x0, y0] = profile2d[0];
        if (Math.abs(x - x0) < 1e-9 && Math.abs(y - y0) < 1e-9) continue;
      }
      lathePoints.push(new THREE.Vector2(Math.max(x, 0), y));
    }
    if (lathePoints.length < 2) return;

    // posId: AXIS2PLACEMENT3D places the solid in product local space (IFC mm)
    const posMat = rev.posId != null ? buildAP3DMatrix(ap3d[rev.posId], pts, dirs) : new THREE.Matrix4();
    const combined = mat.clone().multiply(posMat);

    let geo;
    try { geo = new THREE.LatheGeometry(lathePoints, 24, 0, rev.angle); }
    catch (e) { return; }

    const posArr = geo.attributes.position.array;
    const idxArr = geo.index ? geo.index.array : null;
    if (idxArr) {
      for (let i = 0; i < idxArr.length; i += 3) {
        const a = idxArr[i], b = idxArr[i + 1], c = idxArr[i + 2];
        const wa = applyMatrix4ToVert(combined, posArr[a*3], posArr[a*3+1], posArr[a*3+2]);
        const wb = applyMatrix4ToVert(combined, posArr[b*3], posArr[b*3+1], posArr[b*3+2]);
        const wc = applyMatrix4ToVert(combined, posArr[c*3], posArr[c*3+1], posArr[c*3+2]);
        addTriangle(wa[0]*US, wa[1]*US, wa[2]*US, wb[0]*US, wb[1]*US, wb[2]*US, wc[0]*US, wc[1]*US, wc[2]*US);
      }
    } else {
      for (let i = 0; i < posArr.length / 9; i++) {
        const wa = applyMatrix4ToVert(combined, posArr[i*9],   posArr[i*9+1], posArr[i*9+2]);
        const wb = applyMatrix4ToVert(combined, posArr[i*9+3], posArr[i*9+4], posArr[i*9+5]);
        const wc = applyMatrix4ToVert(combined, posArr[i*9+6], posArr[i*9+7], posArr[i*9+8]);
        addTriangle(wa[0]*US, wa[1]*US, wa[2]*US, wb[0]*US, wb[1]*US, wb[2]*US, wc[0]*US, wc[1]*US, wc[2]*US);
      }
    }
    geo.dispose();
  }

  function processItem(itemId, mat) {
    // MappedItem
    if (mapItems[itemId]) {
      const mi = mapItems[itemId];
      const rm = repMaps[mi.repMapId];
      if (rm) {
        const apMat = rm.apId != null ? buildAP3DMatrix(ap3d[rm.apId], pts, dirs) : new THREE.Matrix4();
        let tMat = mat.clone().multiply(apMat);
        if (mi.transformId != null && ctops[mi.transformId]) tMat = applyCTOP(tMat, ctops[mi.transformId], pts, dirs);
        const subItems = shReps[rm.repId] || [];
        for (const sub of subItems) processItem(sub, tMat);
      }
      return;
    }
    // Shell-based
    if (shells[itemId]) { processShell(itemId, mat); return; }
    // ShellBasedSurfaceModel — v1.7.0: wrapper around IFCOPENSHELL
    if (shellModels[itemId] != null) { processShell(shellModels[itemId], mat); return; }
    // FacetedBrep
    if (fbreps[itemId] !== undefined) { processShell(fbreps[itemId], mat); return; }
    // ExtrudedAreaSolid
    if (extrudes[itemId]) { processExtrude(itemId, mat); return; }
    // SweptDisk
    if (sweptDisks[itemId]) { processSweptDisk(itemId, mat); return; }
    // RevolvedAreaSolid (v1.10.0: pipe elbows)
    if (revolvedSolids[itemId]) { processRevolved(itemId, mat); return; }
    // PolygonalFaceSet
    if (polyFaceSets[itemId]) { processPolyFaceSet(itemId, mat); return; }
    // TriangulatedFaceSet
    if (triFaceSets[itemId]) { processTriFaceSet(itemId, mat); return; }
    // BoundingBox — draw a simple box (large-file fallback)
    if (boolOps && boolOps[itemId] && boolOps[itemId].type === 'bbox') {
      const bb = boolOps[itemId];
      const corner = pts[bb.cornerId] || [0,0,0];
      const cx = corner[0], cy = corner[1], cz = corner[2];
      const xd = bb.xd, yd = bb.yd, zd = bb.zd;
      const corners = [
        [cx,cy,cz],[cx+xd,cy,cz],[cx+xd,cy+yd,cz],[cx,cy+yd,cz],
        [cx,cy,cz+zd],[cx+xd,cy,cz+zd],[cx+xd,cy+yd,cz+zd],[cx,cy+yd,cz+zd]
      ].map(v => applyMatrix4ToVert(mat, v[0], v[1], v[2]));
      const faces6 = [[0,1,2,3],[4,7,6,5],[0,4,5,1],[2,6,7,3],[0,3,7,4],[1,5,6,2]];
      for (const f of faces6) addFace(f.map(i=>corners[i]));
    }
  }

  for (const itemId of itemIds) {
    processItem(itemId, worldMat);
  }

  if (allPos.length === 0) return null;

  // v1.1.0: Deduplicera vertices → smooth shading.
  // Nuvarande builder skapar separata vertices per triangel (unshared). Det ger flat
  // shading eftersom computeVertexNormals() inte kan interpolera normals över kanter.
  // Vi deduplicerar med en HashMap keyed på kvantiserade koordinater (0.1mm precision).
  const QUANT = 1e4; // 0.1 mm precision vid meter-skala
  const vertMap = new Map();
  const newPos = [];
  const newIdx = [];
  for (let i = 0; i < allIdx.length; i++) {
    const vi = allIdx[i];
    const x = allPos[vi*3], y = allPos[vi*3+1], z = allPos[vi*3+2];
    const key = `${Math.round(x*QUANT)},${Math.round(y*QUANT)},${Math.round(z*QUANT)}`;
    let ni = vertMap.get(key);
    if (ni === undefined) {
      ni = newPos.length / 3;
      vertMap.set(key, ni);
      newPos.push(x, y, z);
    }
    newIdx.push(ni);
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(newPos), 3));
  geo.setIndex(newIdx);
  geo.computeVertexNormals(); // Nu korrekt — vertices delas över kanter
  return geo;
}

// ── PROFILE RESOLVER ──────────────────────────────────────────────────────────
function resolveProfile(profileId, profiles, pts, dirs, ap3d, cartPtLists2D, indexedPolyCurves, polylines) {
  const prof = profiles[profileId];
  if (!prof) return null;

  if (prof.type === 'rectangle') {
    const hw = prof.xDim / 2, hh = prof.yDim / 2;
    return [[-hw,-hh],[hw,-hh],[hw,hh],[-hw,hh]];
  }
  if (prof.type === 'circle') {
    const r = prof.radius; const SEGS = 16; // v1.1.0: Höjt från 10 → 16
    return Array.from({length: SEGS}, (_,i) => {
      const a = (i / SEGS) * Math.PI * 2;
      return [Math.cos(a)*r, Math.sin(a)*r];
    });
  }
  if (prof.type === 'ishape') {
    const { ow, od, wt, ft } = prof;
    const hw = ow/2, hd = od/2, hwt = wt/2;
    return [
      [-hw, -hd], [hw, -hd], [hw, -hd+ft], [hwt, -hd+ft],
      [hwt, hd-ft], [hw, hd-ft], [hw, hd], [-hw, hd],
      [-hw, hd-ft], [-hwt, hd-ft], [-hwt, -hd+ft], [-hw, -hd+ft]
    ];
  }
  if (prof.type === 'closed' || prof.type === 'closedWithVoids') {
    const curveId = prof.type === 'closed' ? prof.curveId : prof.outerCurveId;
    return resolveCurve2D(curveId, pts, cartPtLists2D, indexedPolyCurves, polylines);
  }
  return null;
}

function resolveCurve2D(curveId, pts, cartPtLists2D, indexedPolyCurves, polylines) {
  if (indexedPolyCurves[curveId]) {
    const ipc = indexedPolyCurves[curveId];
    const list = cartPtLists2D[ipc.listId];
    if (!list) return null;
    return list;
  }
  if (polylines[curveId]) {
    const refs = polylines[curveId];
    const result = [];
    for (const ref of refs) {
      const pt = pts[ref];
      if (pt) result.push([pt[0], pt[1]]);
    }
    return result.length >= 2 ? result : null;
  }
  return null;
}

function buildAP3DMatrix(ap, pts, dirs) {
  if (!ap) return new THREE.Matrix4();
  const loc = pts[ap.loc] || [0, 0, 0];
  const axisV = ap.axis != null ? dirs[ap.axis] : null;
  const refV  = ap.ref  != null ? dirs[ap.ref]  : null;

  let Z = axisV ? new THREE.Vector3(...axisV).normalize() : new THREE.Vector3(0, 0, 1);
  let X = refV  ? new THREE.Vector3(...refV).normalize()  : new THREE.Vector3(1, 0, 0);
  let Y = new THREE.Vector3().crossVectors(Z, X).normalize();
  X = new THREE.Vector3().crossVectors(Y, Z).normalize();

  const m = new THREE.Matrix4().makeBasis(X, Y, Z);
  m.setPosition(loc[0], loc[1], loc[2]);
  return m;
}

// ── BOOTSTRAP ────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  initThree();
  setupFileDrop();
  checkVRSupport();
});

function checkVRSupport() {
  if (!navigator.xr) {
    document.getElementById('no-vr-msg').style.display = 'inline';
    return;
  }
  if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
    const msg = document.getElementById('no-vr-msg');
    msg.textContent = '⚠ VR kräver HTTPS — ladda upp till GitHub Pages';
    msg.style.display = 'inline';
    // Still show the VR button so user can click it and get the full explanation
    document.getElementById('vr-btn').style.display = 'inline-block';
    return;
  }
  navigator.xr.isSessionSupported('immersive-vr').then(ok => {
    if (ok) document.getElementById('vr-btn').style.display = 'inline-block';
    else document.getElementById('no-vr-msg').style.display = 'inline';
  });
}

// ── VR DIAGNOSTICS ────────────────────────────────────────────────────────────
async function runVRDiagnostics() {
  const el = document.getElementById('diag-overlay');
  const out = document.getElementById('diag-output');
  el.style.display = 'block';
  out.textContent = 'Kör...';

  const lines = [];
  const ok  = s => `✅  ${s}`;
  const err = s => `❌  ${s}`;
  const inf = s => `ℹ️   ${s}`;

  lines.push('── MILJÖ ───────────────────────────────────────');
  lines.push(inf(`URL:              ${location.href}`));
  lines.push(inf(`Protokoll:        ${location.protocol}`));
  lines.push(inf(`isSecureContext:  ${window.isSecureContext}`));
  lines.push(inf(`UserAgent:        ${navigator.userAgent}`));
  lines.push('');
  lines.push('── WebXR API ───────────────────────────────────');

  if (!navigator.xr) {
    lines.push(err('navigator.xr saknas — WebXR inte tillgängligt i denna webbläsare'));
    out.textContent = lines.join('\n');
    return;
  }
  lines.push(ok('navigator.xr finns'));

  for (const mode of ['immersive-vr', 'immersive-ar', 'inline']) {
    try {
      const supported = await navigator.xr.isSessionSupported(mode);
      lines.push(supported ? ok(`isSessionSupported('${mode}')`) : err(`isSessionSupported('${mode}') → false`));
    } catch (e) {
      lines.push(err(`isSessionSupported('${mode}') kastade: ${e.message}`));
    }
    out.textContent = lines.join('\n');
  }

  lines.push('');
  lines.push('── requestSession-test (varje config testas) ───');

  const configs = [
    { label: 'local-floor (standard Quest)',    opts: { requiredFeatures: ['local-floor'] } },
    { label: 'local-floor + hand-tracking',     opts: { requiredFeatures: ['local-floor'], optionalFeatures: ['hand-tracking'] } },
    { label: 'local (minimal)',                  opts: { requiredFeatures: ['local'] } },
    { label: 'inga features alls',               opts: {} },
    { label: 'local-floor + layers',             opts: { requiredFeatures: ['local-floor'], optionalFeatures: ['layers'] } },
  ];

  for (const cfg of configs) {
    try {
      const s = await navigator.xr.requestSession('immersive-vr', cfg.opts);
      lines.push(ok(`"${cfg.label}" → SESSION OK ← kopiera denna rad!`));
      await s.end();
    } catch (e) {
      lines.push(err(`"${cfg.label}" → ${e.message}`));
    }
    out.textContent = lines.join('\n');
    await new Promise(r => setTimeout(r, 100));
  }

  lines.push('');
  lines.push('── ANALYS ──────────────────────────────────────');
  const isQuest = navigator.userAgent.includes('Quest');
  if (isQuest) {
    lines.push('⚠️  Quest detekterad.');
    lines.push('');
    lines.push('   OBS: requestSession-testerna ovan misslyckas alltid');
    lines.push('   i diagnostikläget — de körs i en async-loop som inte');
    lines.push('   längre räknas som en direkt användargest. Det betyder');
    lines.push('   INTE att din enhet är trasig.');
    lines.push('');
    lines.push('   Det vanligaste felet på Quest:');
    lines.push('   👉 Headsetet MÅSTE vara på huvudet när du trycker');
    lines.push('      "Starta VR". Proximity-sensorn (inuti headsetet)');
    lines.push('      måste registrera ansiktet — annars blockerar Meta');
    lines.push('      Browser alla immersive-sessioner.');
    lines.push('');
    lines.push('   Gör så här:');
    lines.push('   1. Stäng diagnostiken (X Stäng)');
    lines.push('   2. Ta på headsetet');
    lines.push('   3. Tryck "▶ Starta VR" med kontrollern');
  }
  if (!window.isSecureContext) {
    lines.push('');
    lines.push('⚠️  isSecureContext = false — WebXR kräver HTTPS.');
  }
  out.textContent = lines.join('\n');
}
</script>
</body>
</html>
